<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weave</title>
  <script>
    // Редирект на основную страницу
    const token = localStorage.getItem('weave_token') || sessionStorage.getItem('weave_token');
    if (token) {
      window.location.replace('/pages/feed.html');
    } else {
      window.location.replace('/pages/login.html');
    }
  </script>
</head>
<body></body>
</html>
