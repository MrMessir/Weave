<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Weave — Новый пароль</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script>(function(){try{var p=JSON.parse(localStorage.getItem('weave_prefs')||'{}');if(p.theme==='light')document.body.classList.add('light');}catch(e){}})()</script>
<style>
:root{--v:#7C3AED;--b:#2563EB;--bg:#09090F;--s1:#0D0D1A;--s2:#111120;--br:rgba(124,58,237,.2);--tx:#E8E4FF;--mu:#6B6B8F;--er:#F87171;--gn:#34D399}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
body.light{--bg:#F5F4F0;--s1:#EEECEA;--s2:#E8E6E2;--tx:#111827;--mu:#6B7280;--br:rgba(0,0,0,.1)}
.card{width:100%;max-width:400px;background:var(--s1);border:1px solid var(--br);border-radius:20px;padding:32px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;background:linear-gradient(135deg,#C4B5FD,#7DD3FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:24px}
h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;margin-bottom:8px}
.sub{color:var(--mu);font-size:.85rem;margin-bottom:24px;line-height:1.5}
.field{margin-bottom:14px}
.field label{display:block;font-size:.75rem;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.field input{width:100%;background:var(--s2);border:1px solid rgba(255,255,255,.06);border-radius:11px;padding:11px 14px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:1rem;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--v)}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--v),var(--b));border:none;border-radius:13px;color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;margin-top:6px;transition:opacity .18s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:default}
.alert{padding:11px 14px;border-radius:11px;font-size:.83rem;margin-bottom:14px;display:none}
.alert.ok{background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.25);color:var(--gn)}
.alert.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);color:var(--er)}
.back{display:flex;align-items:center;gap:5px;color:var(--mu);font-size:.82rem;text-decoration:none;margin-top:18px}
.back:hover{color:var(--v)}
.strength{height:3px;border-radius:2px;background:var(--s2);margin-top:5px;overflow:hidden}
.strength-bar{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Weave.</div>
  <h1>Новый пароль</h1>
  <p class="sub">Придумай надёжный пароль для своего аккаунта.</p>
  <div class="alert ok" id="alert-ok">✓ Пароль изменён! Перенаправляем...</div>
  <div class="alert err" id="alert-err"></div>
  <div id="form-wrap">
    <div class="field">
      <label>Новый пароль</label>
      <input type="password" id="password" placeholder="Минимум 6 символов" oninput="checkStr(this.value)">
      <div class="strength"><div class="strength-bar" id="str-bar"></div></div>
    </div>
    <div class="field">
      <label>Повторить пароль</label>
      <input type="password" id="password2" placeholder="Повтори пароль">
    </div>
    <button class="btn" id="btn" onclick="submit()">Сохранить пароль</button>
  </div>
  <a class="back" href="login.html">← Вернуться ко входу</a>
</div>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) { document.getElementById('alert-err').textContent='Недействительная ссылка'; document.getElementById('alert-err').style.display='block'; document.getElementById('form-wrap').style.display='none'; }

function checkStr(v) {
  let s = 0;
  if(v.length>=6) s++;
  if(v.length>=10) s++;
  if(/[A-Z]/.test(v)) s++;
  if(/[0-9]/.test(v)) s++;
  if(/[^a-zA-Z0-9]/.test(v)) s++;
  const bar = document.getElementById('str-bar');
  const colors = ['#EF4444','#F97316','#EAB308','#22C55E','#10B981'];
  bar.style.width = (s*20)+'%';
  bar.style.background = colors[s-1]||'#EF4444';
}

async function submit() {
  const pw = document.getElementById('password').value;
  const pw2 = document.getElementById('password2').value;
  const errEl = document.getElementById('alert-err');
  errEl.style.display='none';
  if(pw.length<6){errEl.textContent='Пароль минимум 6 символов';errEl.style.display='block';return}
  if(pw!==pw2){errEl.textContent='Пароли не совпадают';errEl.style.display='block';return}
  const btn = document.getElementById('btn');
  btn.disabled=true; btn.textContent='Сохранение...';
  try {
    const r = await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,newPassword:pw})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'Ошибка');
    document.getElementById('form-wrap').style.display='none';
    document.getElementById('alert-ok').style.display='block';
    setTimeout(()=>location.href='login.html',2000);
  } catch(e) {
    errEl.textContent=e.message; errEl.style.display='block';
    btn.disabled=false; btn.textContent='Сохранить пароль';
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')submit()});
</script>
</body>
</html>
