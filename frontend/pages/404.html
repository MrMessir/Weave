<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#7C3AED">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- iOS Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Weave">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="apple-touch-startup-image" href="/icons/icon-512.png">
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png">
  <link rel="shortcut icon" href="/icons/icon-32.png">
<title>Weave — Страница не найдена</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script>(function(){try{var p=JSON.parse(localStorage.getItem('weave_prefs')||'{}');var t=p.theme||'light';if(t==='light')document.body.classList.add('light');if(t==='amoled')document.body.classList.add('amoled');var ac={purple:{v:'#7C3AED',vl:'#A78BFA',vd:'#4C1D95',b:'#2563EB',bl:'#60A5FA'}};var a=ac[p.accent]||ac.purple;var r=document.documentElement;r.style.setProperty('--v',a.v);r.style.setProperty('--vl',a.vl);r.style.setProperty('--b',a.b);}catch(e){}})()</script>
<style>
:root{--v:#7C3AED;--vl:#A78BFA;--b:#2563EB;--bg:#09090F;--s1:#0D0D1A;--tx:#E8E4FF;--mu:#6B6B8F}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
body.light{--bg:#F0EFF8;--s1:#E8E6F5;--tx:#1A1128;--mu:#7070A0}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;background:linear-gradient(135deg,#C4B5FD,#7DD3FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:40px}
.err-code{font-family:'Syne',sans-serif;font-weight:800;font-size:8rem;line-height:1;background:linear-gradient(135deg,var(--v),var(--b));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
.err-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.5rem;margin-bottom:10px}
.err-sub{color:var(--mu);font-size:.95rem;margin-bottom:36px;max-width:340px;line-height:1.6}
.btn-home{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--v),var(--b));color:#fff;text-decoration:none;padding:12px 28px;border-radius:14px;font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;transition:opacity .18s}
.btn-home:hover{opacity:.88}
.err-img{font-size:5rem;margin-bottom:24px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
</style>
</head>
<body>
<div class="logo">Weave<span style="-webkit-text-fill-color:var(--vl)">.</span></div>
<div class="err-img">🌐</div>
<div class="err-code">404</div>
<div class="err-title">Страница не найдена</div>
<div class="err-sub">Возможно, ссылка устарела или страница была удалена. Не переживай — лента ждёт тебя.</div>
<a class="btn-home" href="feed.html">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  Вернуться в ленту
</a>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('SW зарегистрирован:', reg.scope))
      .catch(err => console.warn('SW ошибка:', err));
  });
}
</script>
</body>
</html>
