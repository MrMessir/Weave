<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#7C3AED">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- iOS Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Weave">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="apple-touch-startup-image" href="/icons/icon-512.png">
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png">
  <link rel="shortcut icon" href="/icons/icon-32.png">
<title>Weave — Лента</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet"/>
<style>
/* Стили такие же как в твоем файле, оставляю без изменений */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --v:#7C3AED;--vl:#A78BFA;--vd:#4C1D95;
  --b:#2563EB;--bl:#60A5FA;--cy:#06B6D4;
  --bg:#09090F;--s1:#0D0D1A;--s2:#111120;--s3:#151528;
  --br:rgba(124,58,237,.18);--br2:rgba(255,255,255,.06);
  --tx:#E8E4FF;--mu:#6B6B8F;--mu2:#3D3D5C;
  --pk:#F472B6;--gn:#34D399;--er:#F87171;
  --nav-w:260px;--nav-collapsed:68px;
}
html{scroll-behavior:smooth}
body{min-height:100vh;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--tx);display:flex}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(124,58,237,.055) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0}

/* ═══ LEFT NAV (VK style) ═══ */
.sidenav{
  width:var(--nav-w);flex-shrink:0;
  position:fixed;top:0;left:0;bottom:0;z-index:90;
  background:var(--s1);border-right:1px solid var(--br);
  display:flex;flex-direction:column;
  transition:width .25s cubic-bezier(.22,1,.36,1);
  overflow:hidden;
}
.sidenav:hover{width:var(--nav-w)}
.sn-logo{
  padding:20px 18px 14px;display:flex;align-items:center;gap:12px;
  text-decoration:none;flex-shrink:0;
}
.sn-logo-icon{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--v),var(--b));
  display:grid;place-items:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:#fff;
}
.sn-logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;background:linear-gradient(135deg,#C4B5FD,#7DD3FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.sn-logo-text span{opacity:.5}

/* User card in nav */
.sn-user{
  margin:0 12px 16px;padding:12px;
  background:var(--s2);border:1px solid var(--br);border-radius:14px;
  display:flex;align-items:center;gap:10px;cursor:pointer;
  transition:background .2s;text-decoration:none;flex-shrink:0;
  overflow:hidden;
}
.sn-user:hover{background:rgba(124,58,237,.12)}
.sn-ava{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;color:#fff;border:2px solid var(--br)}
.sn-user-info{min-width:0;flex:1}
.sn-user-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.84rem;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sn-user-handle{font-size:.72rem;color:var(--mu);white-space:nowrap}
.sn-online{width:8px;height:8px;border-radius:50%;background:var(--gn);flex-shrink:0;box-shadow:0 0 6px var(--gn)}

/* Nav items */
.sn-section{padding:0 8px;margin-bottom:6px;flex-shrink:0}
.sn-label{font-size:.64rem;font-weight:600;color:var(--mu2);letter-spacing:.08em;text-transform:uppercase;padding:6px 10px 4px;white-space:nowrap;overflow:hidden}
.sn-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 10px;border-radius:12px;
  text-decoration:none;color:var(--mu);
  font-size:.88rem;font-weight:500;
  transition:all .18s;cursor:pointer;position:relative;
  white-space:nowrap;overflow:hidden;
}
.sn-item:hover{background:rgba(124,58,237,.1);color:var(--tx)}
.sn-item.active{background:rgba(124,58,237,.18);color:var(--vl)}
.sn-item svg{width:20px;height:20px;flex-shrink:0}
.sn-item-label{flex:1;overflow:hidden;text-overflow:ellipsis}
.sn-badge{background:var(--v);color:#fff;font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0}
.sn-divider{height:1px;background:var(--br);margin:8px 16px}

/* ═══ MAIN CONTENT ═══ */
.main{margin-left:var(--nav-w);flex:1;min-width:0;position:relative;z-index:1}

/* Top bar */
.topbar{
  position:sticky;top:0;z-index:80;height:56px;
  background:rgba(9,9,15,.9);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--br);
  display:flex;align-items:center;padding:0 20px;gap:14px;
}
.topbar-search{flex:1;max-width:400px;position:relative}
.topbar-search input{width:100%;padding:8px 14px 8px 36px;background:rgba(255,255,255,.05);border:1px solid var(--br);border-radius:20px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;transition:all .2s}
.topbar-search input:focus{border-color:var(--vl);background:rgba(124,58,237,.08);box-shadow:0 0 0 3px rgba(124,58,237,.14)}
.topbar-search input::placeholder{color:var(--mu2)}
.topbar-search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--mu);width:14px;height:14px;pointer-events:none}
.topbar-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.tb-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid var(--br2);display:grid;place-items:center;cursor:pointer;color:var(--mu);transition:all .2s;position:relative}
.tb-btn:hover{background:rgba(124,58,237,.15);color:var(--vl)}
.tb-btn svg{width:16px;height:16px}
.tb-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--vl);border:1.5px solid var(--bg)}

/* ═══ CONTENT AREA ═══ */
.content-wrap{display:grid;grid-template-columns:1fr 260px;gap:20px;max-width:940px;margin:0 auto;padding:20px 20px 60px}

/* ═══ STORIES ═══ */
.stories-row{
  background:var(--s2);border:1px solid var(--br);
  border-radius:18px;padding:16px;margin-bottom:16px;
  overflow:hidden;
}
.stories-scroll{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.stories-scroll::-webkit-scrollbar{display:none}
.story-item{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex-shrink:0;width:70px}
.story-ring{width:64px;height:64px;border-radius:50%;padding:2.5px;background:linear-gradient(135deg,#E1306C,#F56040,#FCAF45);flex-shrink:0;transition:transform .2s,filter .2s}
.story-ring:hover{transform:scale(1.07);filter:brightness(1.1)}
.story-ring.seen{background:var(--br2);padding:2px}
.story-ring.mine-ring{background:none;border:2px dashed rgba(124,58,237,.5);display:flex;align-items:center;justify-content:center}
.story-ring.mine-ring:hover{border-color:var(--vl)}
.story-inner{width:100%;height:100%;border-radius:50%;background:var(--s3);display:grid;place-items:center;font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:#fff;border:2px solid var(--s2)}
.story-add-plus{position:relative}
.story-add-plus::after{content:'+';position:absolute;bottom:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:var(--v);color:#fff;font-size:.75rem;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--s2)}
.story-label{font-size:.66rem;color:var(--mu);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.story-label.mine{color:var(--vl)}

/* ═══ STORY VIEWER ═══ */
.sv{position:fixed;inset:0;z-index:500;background:#000;display:none;align-items:center;justify-content:center}
.sv.open{display:flex}
.sv-card{position:relative;width:min(420px,100vw);height:100vh;max-height:100vh;overflow:hidden;background:#111}
.sv-prog{position:absolute;top:0;left:0;right:0;display:flex;gap:3px;padding:10px 12px 0;z-index:5}
.sv-seg{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.3);overflow:hidden}
.sv-fill{height:100%;background:#fff;width:0}
.sv-fill.done{width:100%}
.sv-fill.running{animation:svRun var(--d,5s) linear forwards}
@keyframes svRun{to{width:100%}}
.sv-top{position:absolute;top:0;left:0;right:0;padding:22px 14px 10px;display:flex;align-items:center;justify-content:space-between;z-index:5;background:linear-gradient(to bottom,rgba(0,0,0,.55) 0%,transparent 100%)}
.sv-who{display:flex;align-items:center;gap:10px}
.sv-a{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;color:#fff;border:2px solid rgba(255,255,255,.35)}
.sv-nm{font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;color:#fff}
.sv-tm{font-size:.7rem;color:rgba(255,255,255,.55)}
.sv-x{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.7);width:34px;height:34px;display:grid;place-items:center;border-radius:50%;transition:background .2s}
.sv-x:hover{background:rgba(255,255,255,.15)}
.sv-x svg{width:20px;height:20px}
.sv-body{width:100%;height:100%;position:relative}
.sv-slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .15s}
.sv-slide.on{opacity:1;pointer-events:all}
.sv-slide img{width:100%;height:100%;object-fit:cover}
.sv-slide-txt{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:28px}
.sv-slide-txt p{font-size:1.05rem;line-height:1.6;color:#fff;text-align:center;text-shadow:0 2px 10px rgba(0,0,0,.6);background:rgba(0,0,0,.25);padding:16px 20px;border-radius:14px;backdrop-filter:blur(6px)}
.sv-tap-l,.sv-tap-r{position:absolute;top:0;bottom:72px;width:40%;z-index:3;cursor:pointer}
.sv-tap-l{left:0}.sv-tap-r{right:0}
.sv-bottom{position:absolute;bottom:0;left:0;right:0;padding:14px;display:flex;gap:10px;align-items:center;z-index:5;background:linear-gradient(to top,rgba(0,0,0,.5),transparent)}
.sv-reply{flex:1;padding:10px 16px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:24px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;backdrop-filter:blur(4px)}
.sv-reply::placeholder{color:rgba(255,255,255,.45)}
.sv-send{width:38px;height:38px;border-radius:50%;background:var(--v);border:none;cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:background .2s}
.sv-send:hover{background:var(--b)}
.sv-send svg{width:15px;height:15px;color:#fff}
.sv-nav-prev,.sv-nav-next{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;color:#fff;display:grid;place-items:center;backdrop-filter:blur(4px);transition:background .2s;z-index:6}
.sv-nav-prev{left:-56px}.sv-nav-next{right:-56px}
.sv-nav-prev:hover,.sv-nav-next:hover{background:rgba(255,255,255,.25)}
.sv-nav-prev svg,.sv-nav-next svg{width:20px;height:20px}

/* ═══ COMPOSE ═══ */
.compose{background:var(--s2);border:1px solid var(--br);border-radius:18px;padding:16px;margin-bottom:16px;animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.cmp-top{display:flex;gap:12px;align-items:flex-start}
.cmp-ava{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;color:#fff}
.cmp-right{flex:1;min-width:0;position:relative}
.cmp-ta{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--br2);border-radius:12px;padding:10px 14px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.9rem;resize:none;outline:none;min-height:44px;max-height:200px;transition:border-color .2s,box-shadow .2s}
.cmp-ta:focus{border-color:var(--vl);box-shadow:0 0 0 3px rgba(124,58,237,.13)}
.cmp-ta::placeholder{color:var(--mu2)}
.cmp-imgs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.ci-w{position:relative;border-radius:10px;overflow:hidden;width:76px;height:76px;flex-shrink:0}
.ci-w img{width:100%;height:100%;object-fit:cover}
.ci-rm{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.75);border:none;cursor:pointer;color:#fff;display:grid;place-items:center;font-size:9px;transition:background .2s}
.ci-rm:hover{background:#dc2626}
.cmp-bar{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--br2)}
.cmp-tools{display:flex;gap:2px}
.cmp-tool{width:32px;height:32px;border-radius:8px;background:none;border:none;cursor:pointer;color:var(--mu);display:grid;place-items:center;transition:all .18s}
.cmp-tool:hover{background:rgba(124,58,237,.14);color:var(--vl)}
.cmp-tool svg{width:16px;height:16px}
.cmp-right-bar{display:flex;align-items:center;gap:10px}
.cmp-cnt{font-size:.74rem;color:var(--mu2)}
.btn-post{padding:8px 20px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--v),var(--b));color:#fff;font-family:'Syne',sans-serif;font-weight:600;font-size:.82rem;transition:opacity .2s,transform .15s;box-shadow:0 2px 12px rgba(124,58,237,.32)}
.btn-post:hover{opacity:.9;transform:translateY(-1px)}
.btn-post:disabled{opacity:.3;cursor:not-allowed;transform:none}
.ac-box{position:absolute;background:var(--s3);border:1px solid var(--br);border-radius:12px;padding:6px;min-width:180px;z-index:60;box-shadow:0 8px 28px rgba(0,0,0,.5);top:calc(100% + 4px);left:0}
.ac-it{padding:8px 12px;border-radius:8px;cursor:pointer;font-size:.84rem;color:var(--tx);transition:background .12s;display:flex;align-items:center;gap:8px}
.ac-it:hover,.ac-it.sel{background:rgba(124,58,237,.2);color:var(--vl)}

/* ═══ FEED TABS ═══ */
.ftabs{display:flex;gap:4px;margin-bottom:14px;background:var(--s2);border:1px solid var(--br);border-radius:14px;padding:5px}
.ftab{flex:1;padding:8px;border-radius:10px;border:none;cursor:pointer;background:none;color:var(--mu);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;transition:all .18s}
.ftab.on{background:rgba(124,58,237,.2);color:var(--vl)}
.ftab:hover:not(.on){color:var(--tx)}

/* ═══ POST ═══ */
.post{background:var(--s2);border:1px solid var(--br);border-radius:18px;padding:16px;margin-bottom:12px;animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both;transition:border-color .2s}
.post:hover{border-color:rgba(124,58,237,.36)}
.ph{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.pa{width:42px;height:42px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;color:#fff;cursor:pointer;transition:transform .15s}
.pa:hover{transform:scale(1.05)}
.pm{flex:1;min-width:0}
.pn{font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;color:#fff;display:flex;align-items:center;gap:5px;cursor:pointer}
.pn:hover{color:var(--vl)}
.pt{font-size:.75rem;color:var(--mu)}
.pmenu-wrap{position:relative}
.pmenu-btn{background:none;border:none;cursor:pointer;color:var(--mu);padding:4px;border-radius:6px;transition:all .18s}
.pmenu-btn:hover{background:rgba(255,255,255,.06);color:var(--tx)}
.pmenu-btn svg{width:16px;height:16px;display:block}
.pdrop{position:absolute;right:0;top:30px;z-index:50;background:var(--s3);border:1px solid var(--br);border-radius:12px;padding:6px;min-width:160px;box-shadow:0 8px 28px rgba(0,0,0,.5);animation:dropIn .12s ease}
@keyframes dropIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.pd-it{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:.82rem;color:var(--tx);transition:background .12s}
.pd-it:hover{background:rgba(124,58,237,.14);color:var(--vl)}
.pd-it.red:hover{background:rgba(248,113,113,.12);color:var(--er)}
.pd-it svg{width:14px;height:14px;flex-shrink:0}
.pbody{font-size:.9rem;line-height:1.68;color:var(--tx);margin-bottom:12px}
.pbody .tag{color:var(--vl);cursor:pointer;font-weight:500}.pbody .tag:hover{text-decoration:underline}
.pbody .mention{color:var(--bl);cursor:pointer}.pbody .mention:hover{text-decoration:underline}
.pimgs{display:grid;gap:4px;margin-bottom:12px;border-radius:12px;overflow:hidden}
.pimgs.i1{grid-template-columns:1fr}.pimgs.i2{grid-template-columns:1fr 1fr}.pimgs.i3{grid-template-columns:1fr 1fr}.pimgs.i4{grid-template-columns:1fr 1fr}
.pimg{width:100%;object-fit:cover;cursor:pointer;transition:opacity .2s;border-radius:3px}
.pimgs.i1 .pimg{max-height:320px;border-radius:12px}
.pimgs.i2 .pimg{height:180px}
.pimgs.i3 .pimg:first-child{grid-row:span 2;height:230px}
.pimgs.i3 .pimg:not(:first-child){height:112px}
.pimgs.i4 .pimg{height:130px}
.pimg:hover{opacity:.86}
.pacts{display:flex;gap:2px}
.pact{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:8px;border:none;cursor:pointer;background:none;color:var(--mu);font-family:'DM Sans',sans-serif;font-size:.79rem;transition:all .18s}
.pact svg{width:15px;height:15px;flex-shrink:0}
.pact:hover{background:rgba(124,58,237,.1);color:var(--vl)}
.pact.liked{color:var(--pk)}.pact.liked:hover{background:rgba(244,114,182,.1)}
.pact.rp{color:var(--gn)}.pact.rp:hover{background:rgba(52,211,153,.1)}
.pact.bm{color:#FBBF24}.pact.bm:hover{background:rgba(251,191,36,.1)}
@keyframes hpop{0%{transform:scale(1)}40%{transform:scale(1.45)}70%{transform:scale(.9)}100%{transform:scale(1)}}
.hpop{animation:hpop .3s ease}

/* ═══ COMMENTS ═══ */
.cs{border-top:1px solid var(--br2);margin-top:12px;padding-top:12px;display:none}
.cs.on{display:block}
.cs-sort{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cs-sort span{font-size:.76rem;color:var(--mu)}
.sbtns{display:flex;gap:4px}
.sbtn{padding:4px 10px;border-radius:8px;border:1px solid var(--br2);background:none;color:var(--mu);font-size:.7rem;cursor:pointer;transition:all .18s}
.sbtn.on{border-color:var(--vl);color:var(--vl);background:rgba(124,58,237,.1)}
.cc{display:flex;gap:10px;margin-bottom:12px;align-items:flex-start}
.cca{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.68rem;color:#fff}
.ccw{flex:1;position:relative}
.cci{width:100%;padding:8px 38px 8px 12px;background:rgba(255,255,255,.04);border:1px solid var(--br2);border-radius:20px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.84rem;outline:none;transition:all .2s;resize:none}
.cci:focus{border-color:var(--vl);box-shadow:0 0 0 2px rgba(124,58,237,.14)}
.cci::placeholder{color:var(--mu2)}
.ccs{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--mu);width:24px;height:24px;border-radius:50%;display:grid;place-items:center;transition:all .18s}
.ccs:hover{background:rgba(124,58,237,.2);color:var(--vl)}
.ccs svg{width:13px;height:13px}
.cmt{display:flex;gap:10px;margin-bottom:10px;animation:fadeUp .25s ease}
.cmtb{flex:1;min-width:0}
.cmtbub{background:rgba(255,255,255,.04);border:1px solid var(--br2);border-radius:0 13px 13px 13px;padding:9px 13px;margin-bottom:3px}
.cmtan{font-family:'Syne',sans-serif;font-weight:700;font-size:.76rem;color:#fff;margin-bottom:2px}

<script>
// ==================== API КЛИЕНТ ====================
const API = {
  baseURL: '/api',
  
  getToken() {
    return localStorage.getItem('weave_token') || sessionStorage.getItem('weave_token');
  },
  
  async request(endpoint, options = {}) {
    const token = this.getToken();
    const res = await fetch(`${this.baseURL}${endpoint}`, {
      ...options,
      headers: {
        'Content-Type': 'application/json',
        ...(token && { 'Authorization': `Bearer ${token}` }),
        ...options.headers
      }
    });
    
    if (!res.ok) {
      if (res.status === 401) {
        // Токен истек, перенаправляем на логин
        localStorage.removeItem('weave_token');
        sessionStorage.removeItem('weave_token');
        window.location.href = 'login.html';
        throw new Error('Сессия истекла');
      }
      const error = await res.json().catch(() => ({}));
      throw new Error(error.error || 'Ошибка запроса');
    }
    
    return res.json();
  },
  
  // Посты
  async getPosts(tab = 'all', offset = 0, limit = 20) {
    const uid = this.me?.id || '';
    return this.request(`/posts?tab=${tab}&userId=${uid}&offset=${offset}&limit=${limit}`);
  },
  
  async createPost(data) {
    return this.request('/posts', {
      method: 'POST',
      body: JSON.stringify(data)
    });
  },
  
  async updatePost(id, data) {
    return this.request(`/posts/${id}`, {
      method: 'PUT',
      body: JSON.stringify(data)
    });
  },
  
  async deletePost(id) {
    return this.request(`/posts/${id}`, { method: 'DELETE' });
  },
  
  async likePost(postId) {
    return this.request(`/posts/${postId}/like`, { method: 'POST' });
  },
  
  async bookmarkPost(postId) {
    return this.request(`/posts/${postId}/bookmark`, { method: 'POST' });
  },
  
  // Комментарии
  async getComments(postId) {
    return this.request(`/posts/${postId}/comments`);
  },
  
  async createComment(data) {
    return this.request('/comments', {
      method: 'POST',
      body: JSON.stringify(data)
    });
  },
  
  async deleteComment(commentId) {
    return this.request(`/comments/${commentId}`, { method: 'DELETE' });
  },
  
  // Истории
  async getStories() {
    return this.request('/stories');
  },
  
  async createStory(slides) {
    return this.request('/stories', {
      method: 'POST',
      body: JSON.stringify({ slides })
    });
  },
  
  async viewStory(storyId) {
    return this.request(`/stories/${storyId}/view`, { method: 'POST' });
  },
  
  // Профиль
  async getUserProfile(username) {
    return this.request(`/users/${username}`);
  },
  
  async updateProfile(data) {
    return this.request('/users/profile', {
      method: 'PUT',
      body: JSON.stringify(data)
    });
  },
  
  async followUser(userId) {
    return this.request(`/users/${userId}/follow`, { method: 'POST' });
  },
  
  async getFollowers(userId) {
    return this.request(`/users/${userId}/followers`);
  },
  
  async getFollowing(userId) {
    return this.request(`/users/${userId}/following`);
  },
  
  // Поиск
  async search(query, type = 'all') {
    return this.request(`/search?q=${encodeURIComponent(query)}&type=${type}`);
  },
  
  // Сообщения
  async getChats() {
    return this.request('/chats');
  },
  
  async getMessages(userId) {
    return this.request(`/messages/${userId}`);
  },
  
  async sendMessage(toId, text) {
    return this.request('/messages', {
      method: 'POST',
      body: JSON.stringify({ toId, text })
    });
  },
  
  // Админка
  async getMe() {
    return this.request('/users/me');
  },
  
  async getAdminUsers() {
    return this.request('/admin/users');
  },
  
  async setModerator(userId, isModerator) {
    return this.request(`/admin/users/${userId}/moderator`, {
      method: 'POST',
      body: JSON.stringify({ isModerator })
    });
  },
  
  async setBan(userId, isBanned) {
    return this.request(`/admin/users/${userId}/ban`, {
      method: 'POST',
      body: JSON.stringify({ isBanned })
    });
  }
};

// ==================== СОСТОЯНИЕ ====================
let user = null;
let posts = [];
let postsOffset = 0;
let postsTotal = 0;
let postsLoading = false;
let stories = [];
let currentTab = 'all';
let following = new Set();
let editId = null;
let pendImgs = [];
let adminUsers = [];
let adminPosts = [];

// ==================== ИНИЦИАЛИЗАЦИЯ ====================
window.addEventListener('DOMContentLoaded', async () => {
  await loadUser();
  await Promise.all([
    loadPosts(),
    loadStories(),
    loadTrends(),
    loadSuggestions()
  ]);
  
  document.addEventListener('click', closeDrops);
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeEdit();
      closeLB();
      closeDrops();
      closeSV();
    }
  });
});

async function loadUser() {
  try {
    const token = API.getToken();
    if (!token) {
      window.location.href = 'login.html';
      return;
    }
    // Загружаем текущего пользователя с сервера, чтобы получить флаги isAdmin/isModerator/isBanned
    user = await API.getMe();
    localStorage.setItem('weave_current_user', JSON.stringify(user));
    updateUserUI();
    updateAdminNav();
  } catch (error) {
    console.error('Ошибка загрузки пользователя:', error);
    showToast('Ошибка авторизации');
  }
}

function updateUserUI() {
  if (!user) return;
  
  const initials = ((user.firstName?.[0] || '') + (user.lastName?.[0] || '')).toUpperCase() || '?';
  const colors = [
    'linear-gradient(135deg,#7C3AED,#2563EB)',
    'linear-gradient(135deg,#DB2777,#7C3AED)',
    'linear-gradient(135deg,#059669,#2563EB)',
    'linear-gradient(135deg,#D97706,#DB2777)',
    'linear-gradient(135deg,#06B6D4,#7C3AED)',
    'linear-gradient(135deg,#7C3AED,#06B6D4)'
  ];
  const bg = colors[user.avatarColor || 0];
  
  ['sn-ava', 'cmp-ava'].forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.textContent = initials;
      el.style.background = bg;
    }
  });
  
  document.getElementById('sn-name').textContent = `${user.firstName} ${user.lastName || ''}`.trim();
  document.getElementById('sn-handle').textContent = `@${user.username}`;
}

function updateAdminNav() {
  const el = document.getElementById('nav-admin');
  if (!el) return;
  const isPrivileged = !!(user && (user.isAdmin || user.isModerator));
  el.style.display = isPrivileged ? 'flex' : 'none';
}

// ==================== ПОСТЫ ====================

function showSkeletons(n=3){
  const container=document.getElementById('feed');
  if(!container)return;
  container.innerHTML=Array.from({length:n},()=>`
    <div class="sk-card">
      <div class="sk-header">
        <div class="sk-ava skeleton"></div>
        <div style="flex:1">
          <div class="sk-line skeleton" style="width:40%"></div>
          <div class="sk-line skeleton" style="width:25%;margin-top:4px"></div>
        </div>
      </div>
      <div class="sk-line skeleton" style="width:90%"></div>
      <div class="sk-line skeleton" style="width:70%;margin-bottom:10px"></div>
      <div class="sk-body skeleton"></div>
      <div class="sk-footer">
        <div class="sk-foot-btn skeleton"></div>
        <div class="sk-foot-btn skeleton"></div>
        <div class="sk-foot-btn skeleton"></div>
      </div>
    </div>`).join('');
}
async function loadPosts(reset = true) {
  if (postsLoading) return;
  postsLoading = true;
  if (reset) { posts = []; postsOffset = 0; postsTotal = 0; showSkeletons(3); }
  try {
    const data = await API.getPosts(currentTab, postsOffset, 20);
    const newPosts = data.posts || data; // совместимость
    if (reset) posts = newPosts;
    else posts = [...posts, ...newPosts];
    postsTotal = data.total || newPosts.length;
    postsOffset = posts.length;
    renderFeed();
    updateBMBadge();
    renderLoadMore();
  } catch (error) {
    console.error('Ошибка загрузки постов:', error);
    showToast('Не удалось загрузить посты');
  } finally {
    postsLoading = false;
  }
}

function renderLoadMore() {
  const existing = document.getElementById('load-more-btn');
  if (existing) existing.remove();
  if (posts.length < postsTotal) {
    const btn = document.createElement('div');
    btn.id = 'load-more-btn';
    btn.style.cssText = 'text-align:center;padding:20px 0;';
    btn.innerHTML = `<button onclick="loadPosts(false)" style="background:var(--s3);border:1px solid var(--br2);color:var(--vl);padding:10px 28px;border-radius:20px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:.84rem;transition:all .2s" onmouseover="this.style.background='rgba(124,58,237,.15)'" onmouseout="this.style.background='var(--s3)'">Загрузить ещё (${postsTotal - posts.length})</button>`;
    const feed = document.getElementById('feed');
    if (feed) feed.after(btn);
  }
}

function renderFeed() {
  const container = document.getElementById('feed');
  if (!container) return;
  
  if (!posts.length) {
    const messages = {
      all: 'Постов пока нет',
      following: 'Подпишись на кого-нибудь',
      trending: 'Нет постов',
      bookmarks: 'Нет закладок'
    };
    container.innerHTML = `<div class="empty-f">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>${messages[currentTab]}</p>
    </div>`;
    return;
  }
  
  container.innerHTML = posts.map((post, index) => buildPost(post, index)).join('');
}

function buildPost(p, index) {
  const isOwner = p.author?.id === user?.id;
  const bg = `linear-gradient(135deg,#${p.author?.avatarColor || 0},...)`; // Упрощенно
  
  let imgs = '';
  if (p.images?.length) {
    const n = Math.min(p.images.length, 4);
    imgs = `<div class="pimgs i${n}">` + 
      p.images.slice(0,4).map(src => 
        `<img class="pimg" src="${src}" onclick="openLB('${src}')" loading="lazy"/>`
      ).join('') + 
    '</div>';
  }
  
  return `

function formatText(text) {
  if (!text) return '';
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/#(\w+)/g, '<span class="tag" onclick="searchTag(\'#$1\')">#$1</span>')
    .replace(/@(\w+)/g, '<span class="mention" onclick="window.location.href=\'profile.html?user=$1\'">@$1</span>');
}

function formatTime(isoString) {
  if (!isoString) return 'только что';
  const date = new Date(isoString);
  const now = new Date();
  const diffMs = now - date;
  const diffMins = Math.floor(diffMs / 60000);
  const diffHours = Math.floor(diffMs / 3600000);
  const diffDays = Math.floor(diffMs / 86400000);
  
  if (diffMins < 1) return 'только что';
  if (diffMins < 60) return `${diffMins} мин назад`;
  if (diffHours < 24) return `${diffHours} ч назад`;
  if (diffDays < 7) return `${diffDays} дн назад`;
  return date.toLocaleDateString();
}

// ==================== ДЕЙСТВИЯ С ПОСТАМИ ====================
async function toggleLike(postId, btn) {
  try {
    const result = await API.likePost(postId);
    const liked = result.liked;
    
    btn.classList.toggle('liked', liked);
    const svg = btn.querySelector('svg');
    svg.setAttribute('fill', liked ? 'currentColor' : 'none');
    
    const span = document.getElementById(`lk-${postId}`);
    span.textContent = result.likes;
    
    if (liked) {
      svg.classList.add('hpop');
      svg.addEventListener('animationend', () => svg.classList.remove('hpop'), { once: true });
    }
    
    // Обновляем в локальном массиве
    const post = posts.find(p => p.id === postId);
    if (post) {
      post.liked = liked;
      post.likes = result.likes;
    }
  } catch (error) {
    showToast('Ошибка: ' + error.message);
  }
}

async function toggleBookmark(postId, btn) {
  try {
    const result = await API.bookmarkPost(postId);
    btn.classList.toggle('bm', result.bookmarked);
    btn.querySelector('svg').setAttribute('fill', result.bookmarked ? 'currentColor' : 'none');
    
    const post = posts.find(p => p.id === postId);
    if (post) post.bookmarked = result.bookmarked;
    
    updateBMBadge();
    showToast(result.bookmarked ? '🔖 Сохранено' : 'Убрано из закладок');
  } catch (error) {
    showToast('Ошибка: ' + error.message);
  }
}

async function deletePost(postId) {
  if (!confirm('Удалить пост?')) return;
  
  try {
    await API.deletePost(postId);
    
    const postElement = document.getElementById(`post-${postId}`);
    if (postElement) {
      postElement.style.cssText = 'opacity:0;transform:scale(.95);transition:all .22s';
      setTimeout(() => {
        posts = posts.filter(p => p.id !== postId);
        renderFeed();
      }, 240);
    }
    
    showToast('🗑 Пост удалён');
    closeDrops();
  } catch (error) {
    showToast('Ошибка удаления: ' + error.message);
  }
}

function renderComments(postId, comments) {
  const section = document.getElementById('cs-' + postId);
  if (!section) return;
  if (!comments.length) {
    section.innerHTML = '<div style="color:var(--mu);font-size:.8rem;padding:8px 0;text-align:center">Нет комментариев</div>';
    return;
  }
  // Разделить на корневые и ответы
  const roots = comments.filter(cm => !cm.parentId);
  const replies = comments.filter(cm => cm.parentId);
  // Добавить _replyTo к ответам
  replies.forEach(r => {
    const parent = comments.find(cm => cm.id === r.parentId);
    r._replyTo = parent?.author?.username || '';
  });
  let html = '';
  roots.forEach(root => {
    html += buildComment(root, postId, 0);
    const children = replies.filter(r => r.parentId === root.id);
    if (children.length) {
      html += `<div class="cmt-nested">` + children.map(r => buildComment(r, postId, 1)).join('') + `</div>`;
    }
  });
  section.innerHTML = html;
}

async function submitComment(postId) {
  const textarea = document.getElementById(`ci-${postId}`);
  const text = textarea.value.trim();
  if (!text) return;
  
  try {
    const comment = await API.createComment({
      postId,
      text,
      parentId: null
    });
    
    textarea.value = '';
    grow(textarea);
    
    await loadComments(postId);
    showToast('💬 Комментарий добавлен');
  } catch (error) {
    showToast('Ошибка: ' + error.message);
  }
}

const STORY_BGS = [
  'linear-gradient(135deg,#7C3AED,#06B6D4)',
  'linear-gradient(135deg,#DB2777,#7C3AED)',
  'linear-gradient(135deg,#059669,#2563EB)',
  'linear-gradient(135deg,#D97706,#DB2777)',
  'linear-gradient(135deg,#0EA5E9,#6366F1)',
  'linear-gradient(135deg,#EC4899,#F97316)'
];
let storyBgIdx = 0;

function cycleBg() {
  storyBgIdx = (storyBgIdx + 1) % STORY_BGS.length;
  const prev = document.getElementById('story-preview');
  if (prev) prev.style.background = STORY_BGS[storyBgIdx];
}

function onStoryImg(inp) {
  const file = inp.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('story-preview-img');
    const txt = document.getElementById('story-preview-text');
    img.src = e.target.result;
    img.style.display = 'block';
    txt.style.position = 'relative';
    txt.style.zIndex = '1';
    txt.style.textShadow = '0 1px 4px rgba(0,0,0,.8)';
  };
  reader.readAsDataURL(file);
  inp.value = '';
}

async function submitStory() {
  const text = document.getElementById('story-text-inp')?.value?.trim() || '';
  const imgEl = document.getElementById('story-preview-img');
  const hasImg = imgEl && imgEl.style.display !== 'none' && imgEl.src;

  if (!text && !hasImg) { showToast('⚠️ Добавь текст или фото'); return; }

  const slide = {
    type: hasImg ? 'image' : 'text',
    text: text,
    bg: STORY_BGS[storyBgIdx],
    image: hasImg ? imgEl.src : null,
    time: 'только что'
  };

  try {
    await API.createStory([slide]);
    document.getElementById('story-creator-ov')?.remove();
    await loadStories();
    showToast('✨ История опубликована!');
  } catch (error) {
    showToast('Ошибка: ' + error.message);
  }
}

// ─── STORY VIEWER ────────────────────────────────────────────
let svStories = [], svIdx = 0, svSlide = 0, svTimer = null;

async function openStory(storyId) {
  try {
    await API.viewStory(storyId);
    svStories = stories;
    svIdx = stories.findIndex(s => s.id === storyId);
    if (svIdx === -1) svIdx = 0;
    svSlide = 0;
    renderSV();
    document.getElementById('sv').classList.add('open');
  } catch (error) {
    showToast('Ошибка: ' + error.message);
  }
}

function renderSV() {
  const s = svStories[svIdx];
  if (!s) { closeSV(); return; }

  const slide = s.slides?.[svSlide];
  if (!slide) { closeSV(); return; }

  // Update story viewer UI
  const svA = document.getElementById('sv-a');
  const initials = ((s.author?.firstName?.[0]||'')+(s.author?.lastName?.[0]||'')).toUpperCase();
  svA.textContent = initials;
  svA.style.background = 'linear-gradient(135deg,#7C3AED,#2563EB)';
  document.getElementById('sv-nm').textContent = s.author?.firstName || 'Пользователь';
  document.getElementById('sv-tm').textContent = formatTime(s.createdAt);

  // Build body
  const body = document.getElementById('sv-body');
  body.style.background = slide.bg || 'var(--s2)';

  if (slide.type === 'image' && slide.image) {
    body.innerHTML = `
      <img src="${slide.image}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0">
      ${slide.text ? `<div style="position:absolute;bottom:70px;left:0;right:0;text-align:center;color:#fff;font-size:1.1rem;font-weight:600;padding:0 20px;text-shadow:0 2px 8px rgba(0,0,0,.7)">${slide.text}</div>` : ''}`;
  } else {
    body.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:30px;text-align:center;font-size:1.3rem;font-weight:600;color:#fff;word-break:break-word;text-shadow:0 2px 8px rgba(0,0,0,.4)">${slide.text || ''}</div>`;
  }

  // Progress bars
  const prog = document.getElementById('sv-prog');
  const total = s.slides?.length || 1;
  prog.innerHTML = Array.from({length: total}, (_,i) => `
    <div style="flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden">
      <div style="height:100%;background:#fff;width:${i < svSlide ? 100 : i === svSlide ? 0 : 0}%;transition:none" id="sv-bar-${i}"></div>
    </div>`).join('');

  // Prev/Next story nav
  document.getElementById('sv-prev').style.display = svIdx > 0 ? '' : 'none';
  document.getElementById('sv-next').style.display = svIdx < svStories.length - 1 ? '' : 'none';

  // Start slide timer
  clearTimeout(svTimer);
  const bar = document.getElementById(`sv-bar-${svSlide}`);
  if (bar) {
    bar.style.transition = 'width 5s linear';
    requestAnimationFrame(() => { bar.style.width = '100%'; });
  }
  svTimer = setTimeout(nextSlide, 5000);
}

function nextSlide(e) {
  if (e) e.stopPropagation();
  clearTimeout(svTimer);
  const s = svStories[svIdx];
  if (s && svSlide < (s.slides?.length || 1) - 1) {
    svSlide++;
    renderSV();
  } else {
    nextStory();
  }
}

function prevSlide(e) {
  if (e) e.stopPropagation();
  clearTimeout(svTimer);
  if (svSlide > 0) { svSlide--; renderSV(); }
  else prevStory();
}

function nextStory() {
  clearTimeout(svTimer);
  if (svIdx < svStories.length - 1) { svIdx++; svSlide=0; renderSV(); }
  else closeSV();
}

function prevStory() {
  clearTimeout(svTimer);
  if (svIdx > 0) { svIdx--; svSlide=0; renderSV(); }
}

function closeSV(e) {
  if (e) e.stopPropagation();
  clearTimeout(svTimer);
  document.getElementById('sv').classList.remove('open');
}

let lastNotifCount = 0;
async function checkNotifications() {
  try {
    const notifs = await API.request('/notifications').catch(()=>[]);
    const unread = (notifs||[]).filter(n=>!n.read).length;
    const badge = document.getElementById('notif-badge');
    if (badge) {
      if (unread > 0) {
        badge.textContent = unread > 9 ? '9+' : unread;
        badge.style.display = 'flex';
      } else {
        badge.style.display = 'none';
      }
    }
    // Тост при новых уведомлениях
    if (unread > lastNotifCount && lastNotifCount >= 0) {
      const diff = unread - lastNotifCount;
      if (diff > 0 && lastNotifCount >= 0 && document.visibilityState === 'visible') {
        showToast(`🔔 ${diff} новое уведомление`);
      }
    }
    lastNotifCount = unread;
    // Синхронизируем мобильный бейдж
    const mobBadge = document.getElementById('mob-notif-badge');
    if (mobBadge) {
      mobBadge.textContent = unread > 9 ? '9+' : unread;
      mobBadge.style.display = unread > 0 ? 'flex' : 'none';
    }
  } catch(e) {}
}
// Запускаем через 3 секунды после загрузки, затем каждые 30 сек
setTimeout(()=>{ checkNotifications(); setInterval(checkNotifications, 30000); }, 3000);

async function refreshOnlineStatus() {
  try {
    const data = await API.request('/online').catch(()=>({online:[]}));
    const onlineSet = new Set(data.online||[]);
    document.querySelectorAll('[data-user-id]').forEach(el => {
      const dot = el.querySelector('.online-dot');
      if (dot) dot.style.background = onlineSet.has(el.dataset.userId) ? 'var(--gn)' : 'rgba(255,255,255,.2)';
    });
  } catch(e) {}
}
setInterval(refreshOnlineStatus, 15000);

function renderAva(el, user, size=''){
  if(!el||!user) return;
  if(user.avatarUrl){
    el.style.backgroundImage='url('+user.avatarUrl+')';
    el.style.backgroundSize='cover';
    el.style.backgroundPosition='center';
    el.innerHTML='';
  } else {
    el.style.backgroundImage='';
    el.style.background=avBg(user.avatarColor);
    const ini=((user.firstName?.[0]||'')+(user.lastName?.[0]||'')).toUpperCase()||'?';
    el.textContent=ini;
  }
}

function updateCharCount(val){
  const el=document.getElementById('char-count');
  if(!el)return;
  const left=500-val.length;
  if(val.length>0){
    el.textContent=left+' симв.';
    el.style.color=left<50?'var(--er)':left<100?'var(--warn,#FBBF24)':'var(--mu)';
  } else {
    el.textContent='';

  const btn=document.getElementById('btn-post');
  if(btn)btn.disabled=val.length>500;
}

let mcmImgs = [];

function openMobCompose() {
  // На десктопе — фокус на обычный compose вместо модалки
  if (window.innerWidth > 600) {
    const ta = document.getElementById('cmp-ta');
    if (ta) { ta.focus(); ta.scrollIntoView({behavior:'smooth', block:'center'}); }
    return;
  }
  const modal = document.getElementById('mob-compose-modal');
  modal.classList.remove('closing');
  modal.style.display = 'flex';
  // Синхронизируем аватар
  const mcmAva = document.getElementById('mcm-ava');
  if (mcmAva && ME) {
    if (ME.avatarUrl) {
      mcmAva.style.backgroundImage = 'url('+ME.avatarUrl+')';
      mcmAva.style.backgroundSize = 'cover';
      mcmAva.textContent = '';
    } else {
      mcmAva.style.backgroundImage = '';
      mcmAva.style.background = avBg(ME.avatarColor);
      const ini = ((ME.firstName?.[0]||'')+(ME.lastName?.[0]||'')).toUpperCase()||'?';
      mcmAva.textContent = ini;
    }
  }
  mcmImgs = [];
  document.getElementById('mcm-imgs').innerHTML = '';
  document.getElementById('mcm-ta').value = '';
  document.getElementById('mcm-cnt').textContent = '500';
  document.getElementById('mcm-post-btn').disabled = true;
  // Фокус с небольшой задержкой (анимация)
  setTimeout(() => document.getElementById('mcm-ta')?.focus(), 280);
  // Блокируем прокрутку body
  document.body.style.overflow = 'hidden';
}

function closeMobCompose() {
  const modal = document.getElementById('mob-compose-modal');
  modal.classList.add('closing');
  document.body.style.overflow = '';
  setTimeout(() => { modal.style.display = 'none'; modal.classList.remove('closing'); }, 200);
}

function onMcmInput(ta) {
  // Auto-resize
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 300) + 'px';
  const left = 500 - ta.value.length;
  document.getElementById('mcm-cnt').textContent = left;
  const cnt = document.getElementById('mcm-cnt');
  cnt.style.color = left < 50 ? 'var(--er)' : left < 100 ? 'var(--warn,#FBBF24)' : 'var(--mu2)';
  document.getElementById('mcm-post-btn').disabled = ta.value.trim().length === 0 && mcmImgs.length === 0;
}

function addMobEmoji() {
  const ta = document.getElementById('mcm-ta');
  const emojis = ['😊','🔥','❤️','👍','🎉','✨','😂','🙌','💪','🤔','😎','🚀'];
  const e = emojis[Math.floor(Math.random() * emojis.length)];
  const pos = ta.selectionStart;
  ta.value = ta.value.slice(0, pos) + e + ta.value.slice(pos);
  ta.selectionStart = ta.selectionEnd = pos + e.length;
  ta.focus();
  onMcmInput(ta);
}

function onMcmImgUpload(inp) {
  const files = Array.from(inp.files);
  if (!files.length) return;
  files.slice(0, 4 - mcmImgs.length).forEach(f => {
    if (f.size > 10 * 1024 * 1024) { showToast('Файл слишком большой'); return; }
    const r = new FileReader();
    r.onload = e => {
      mcmImgs.push(e.target.result);
      renderMcmImgs();
      document.getElementById('mcm-post-btn').disabled = false;
    };
    r.readAsDataURL(f);
  });
  inp.value = '';
}

function renderMcmImgs() {
  document.getElementById('mcm-imgs').innerHTML = mcmImgs.map((src, i) => `
    <div style="position:relative;width:80px;height:80px;border-radius:10px;overflow:hidden;flex-shrink:0">
      <img src="${src}" style="width:100%;height:100%;object-fit:cover">
      <button onclick="mcmImgs.splice(${i},1);renderMcmImgs()" style="position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.8);border:none;cursor:pointer;color:#fff;font-size:11px;display:grid;place-items:center">✕</button>
    </div>`).join('');
}

async function publishMob() {
  const ta = document.getElementById('mcm-ta');
  const text = ta.value.trim();
  if (!text && !mcmImgs.length) return;
  
  const btn = document.getElementById('mcm-post-btn');
  btn.disabled = true;
  btn.textContent = '…';
  
  try {
    await API.createPost({ text, images: mcmImgs });
    closeMobCompose();
    showToast('✓ Пост опубликован', 'ok');
    await loadPosts(true);
  } catch(e) {
    showToast('Ошибка: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Опубликовать';
  }
}

// Закрыть по свайпу вниз
(function(){
  let startY = 0;
  document.addEventListener('touchstart', e => {
    const modal = document.getElementById('mob-compose-modal');
    if (modal?.style.display === 'flex') startY = e.touches[0].clientY;
  }, {passive:true});
  document.addEventListener('touchend', e => {
    const modal = document.getElementById('mob-compose-modal');
    if (modal?.style.display !== 'flex') return;
    const dy = e.changedTouches[0].clientY - startY;
    // Свайп вниз > 80px — закрыть
    if (dy > 80 && startY < 80) closeMobCompose();
  }, {passive:true});
})();
</script>

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Показать баннер если не отклонён ранее
  if (!localStorage.getItem('pwa_dismissed')) {
    setTimeout(() => {
      const banner = document.getElementById('pwa-banner');
      if (banner) banner.classList.add('show');
    }, 4000); // через 4 сек после загрузки
  }
});

document.getElementById('pwa-install-btn')?.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('pwa-banner')?.classList.remove('show');
  if (outcome === 'accepted') showToast('✅ Weave добавлен на экран!');
});

function dismissPWA() {
  document.getElementById('pwa-banner')?.classList.remove('show');
  localStorage.setItem('pwa_dismissed', '1');
}

// ══ Post Image Cropper ══
let _ic = { img:null, x:0, y:0, z:1, ratio:1, drag:false, sx:0, sy:0, cb:null };

function openImgCrop(src, callback) {
  _ic.cb = callback; _ic.x=0; _ic.y=0; _ic.z=1; _ic.ratio=1;
  document.getElementById('img-crop-zoom').value=1;
  document.querySelectorAll('.img-crop-tab').forEach((b,i)=>{b.classList.toggle('active',i===0)});
  const img=new Image();
  img.onload=()=>{ _ic.img=img; _icDraw(); document.getElementById('img-crop-modal').classList.add('open'); };
  img.src=src;
}
function closeImgCrop(){ document.getElementById('img-crop-modal').classList.remove('open'); }
function setImgCropRatio(r,btn){
  _ic.ratio=r; _ic.x=0; _ic.y=0;
  document.querySelectorAll('.img-crop-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  _icDraw();
}
function imgCropZoom(v){ _ic.z=parseFloat(v); _icDraw(); }

function _icDraw(){
  const canvas=document.getElementById('img-crop-canvas');
  const wrap=document.getElementById('img-crop-wrap');
  const W=wrap.offsetWidth;
  const ratio=_ic.ratio||(_ic.img.width/_ic.img.height);
  const H=_ic.ratio?W/ratio:W/(_ic.img.width/_ic.img.height);
  canvas.width=W; canvas.height=H; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const aspect=_ic.img.width/_ic.img.height;
  let dw,dh;
  if(aspect>W/H){dh=H*_ic.z;dw=dh*aspect;}else{dw=W*_ic.z;dh=dw/aspect;}
  ctx.drawImage(_ic.img,(W-dw)/2+_ic.x,(H-dh)/2+_ic.y,dw,dh);
}

function applyImgCrop(){
  const canvas=document.getElementById('img-crop-canvas');
  const out=document.createElement('canvas');
  out.width=canvas.width; out.height=canvas.height;
  out.getContext('2d').drawImage(canvas,0,0);
  const result=out.toDataURL('image/jpeg',0.88);
  closeImgCrop();
  if(_ic.cb) _ic.cb(result);
}

const _icWrap=document.getElementById('img-crop-wrap');
if(_icWrap){
  _icWrap.addEventListener('mousedown',e=>{_ic.drag=true;_ic.sx=e.clientX-_ic.x;_ic.sy=e.clientY-_ic.y;});
  document.addEventListener('mousemove',e=>{if(!_ic.drag)return;_ic.x=e.clientX-_ic.sx;_ic.y=e.clientY-_ic.sy;_icDraw();});
  document.addEventListener('mouseup',()=>_ic.drag=false);
  _icWrap.addEventListener('touchstart',e=>{const t=e.touches[0];_ic.drag=true;_ic.sx=t.clientX-_ic.x;_ic.sy=t.clientY-_ic.y;},{passive:true});
  _icWrap.addEventListener('touchmove',e=>{if(!_ic.drag)return;const t=e.touches[0];_ic.x=t.clientX-_ic.sx;_ic.y=t.clientY-_ic.sy;_icDraw();e.preventDefault();},{passive:false});
  _icWrap.addEventListener('touchend',()=>_ic.drag=false);
}

// ══ Reply to comment ══
let _replyTarget = null; // {commentId, postId, username}

function startReply(commentId, postId, username) {
  // Закрыть предыдущую форму ответа
  document.querySelectorAll('.cmtreply-form').forEach(f => f.remove());
  _replyTarget = { commentId, postId, username };

  const container = document.getElementById('reply-form-' + commentId);
  if (!container) return;

  container.style.display = 'block';
  container.innerHTML = `
    <div class="cmtreply-form">
      <textarea class="cmtreply-inp" id="ri-${commentId}" rows="1"
        placeholder="Ответить @${username}…"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply('${commentId}','${postId}')}"
      ></textarea>
      <button class="cmtreply-send" onclick="sendReply('${commentId}','${postId}')">↑</button>
    </div>`;
  document.getElementById('ri-' + commentId)?.focus();
}

async function sendReply(commentId, postId) {
  const inp = document.getElementById('ri-' + commentId);
  const text = inp?.value.trim();
  if (!text) return;
  try {
    await API.createComment({ postId, text, parentId: commentId });
    inp.value = '';
    const container = document.getElementById('reply-form-' + commentId);
    if (container) { container.innerHTML = ''; container.style.display = 'none'; }
    await loadComments(postId);
  } catch(e) { showToast('Ошибка отправки', 'err'); }
}
