<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#7C3AED">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- iOS Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Weave">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="apple-touch-startup-image" href="/icons/icon-512.png">
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png">
  <link rel="shortcut icon" href="/icons/icon-32.png">
<title>Weave — Сброс пароля</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script>(function(){try{var p=JSON.parse(localStorage.getItem('weave_prefs')||'{}');var t=p.theme||'light';if(t==='light')document.body.classList.add('light');}catch(e){}})()</script>
<style>
:root{--v:#7C3AED;--vl:#A78BFA;--b:#2563EB;--bg:#09090F;--s1:#0D0D1A;--s2:#111120;--s3:#151528;--br:rgba(255,255,255,.08);--br2:rgba(255,255,255,.05);--tx:#E8E4FF;--mu:#6B6B8F;--er:#F87171;--gn:#34D399}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
body.light{--bg:#F0EFF8;--s1:#E8E6F5;--s2:#EAE8F8;--s3:#DDD9F5;--br:rgba(124,58,237,.15);--br2:rgba(0,0,0,.07);--tx:#1A1128;--mu:#7070A0}
.card{width:100%;max-width:420px;background:var(--s1);border:1px solid var(--br);border-radius:20px;padding:36px 32px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;background:linear-gradient(135deg,#C4B5FD,#7DD3FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:28px}
h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;margin-bottom:8px}
.sub{color:var(--mu);font-size:.88rem;margin-bottom:28px;line-height:1.5}
.field{margin-bottom:16px}
.field label{display:block;font-size:.78rem;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.field input{width:100%;background:var(--s2);border:1px solid var(--br2);border-radius:12px;padding:11px 14px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.92rem;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--v)}
.btn-main{width:100%;padding:13px;background:linear-gradient(135deg,var(--v),var(--b));border:none;border-radius:14px;color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;transition:opacity .18s;margin-top:8px}
.btn-main:hover{opacity:.9}
.btn-main:disabled{opacity:.5;cursor:default}
.back{display:flex;align-items:center;gap:6px;color:var(--vl);font-size:.84rem;text-decoration:none;margin-top:20px;font-weight:500}
.back:hover{opacity:.8}
.alert{padding:12px 16px;border-radius:12px;font-size:.85rem;margin-bottom:16px;display:none}
.alert.ok{background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.25);color:var(--gn)}
.alert.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:var(--er)}
.field-err{color:var(--er);font-size:.75rem;margin-top:4px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Weave.</div>
  <h1>Сброс пароля</h1>
  <p class="sub">Введи email или никнейм — мы отправим запрос администратору для сброса.</p>
  
  <div class="alert ok" id="alert-ok">✓ Запрос отправлен! Ожидай ответа от администратора.</div>
  <div class="alert err" id="alert-err"></div>

  <div id="form-wrap">
    <div class="field">
      <label>Email или никнейм</label>
      <input type="text" id="identifier" placeholder="you@example.com или @username" autocomplete="email">
      <div class="field-err" id="ident-err"></div>
    </div>
    <button class="btn-main" id="btn-submit" onclick="submitReset()">Сбросить пароль</button>
  </div>

  <a class="back" href="login.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Вернуться ко входу
  </a>
</div>
<script>
async function submitReset(){
  const identifier=document.getElementById('identifier').value.trim().replace(/^@/,'');
  const errEl=document.getElementById('ident-err');
  errEl.textContent='';
  if(!identifier){ errEl.textContent='Введите email или никнейм'; return; }
  
  const btn=document.getElementById('btn-submit');
  btn.disabled=true; btn.textContent='Отправляем…';
  
  try{
    const r=await fetch('/api/auth/forgot-password',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({identifier})
    });
    const data=await r.json();
    if(!r.ok) throw new Error(data.error||'Ошибка');
    
    document.getElementById('form-wrap').style.display='none';
    const ok=document.getElementById('alert-ok');
    ok.style.display='block';
  }catch(e){
    const errAlert=document.getElementById('alert-err');
    errAlert.textContent=e.message;
    errAlert.style.display='block';
    btn.disabled=false; btn.textContent='Сбросить пароль';
  }
}
document.getElementById('identifier').addEventListener('keydown',e=>{if(e.key==='Enter')submitReset();});
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('SW зарегистрирован:', reg.scope))
      .catch(err => console.warn('SW ошибка:', err));
  });
}
</script>
</body>
</html>
