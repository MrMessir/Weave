<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#7C3AED">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- iOS Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Weave">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="apple-touch-startup-image" href="/icons/icon-512.png">
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png">
  <link rel="shortcut icon" href="/icons/icon-32.png">
<title>Weave — Мессенджер</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --v:#7C3AED;--vl:#A78BFA;--b:#2563EB;--cy:#06B6D4;
  --bg:#09090F;--s1:#0D0D1A;--s2:#111120;--s3:#151528;
  --br:rgba(124,58,237,.18);--br2:rgba(255,255,255,.06);
  --tx:#E8E4FF;--mu:#6B6B8F;--mu2:#3D3D5C;
  --gn:#34D399;--er:#F87171;--nav-w:260px
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--tx);display:flex}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(124,58,237,.055) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0}
/* NAV */
.nav{width:var(--nav-w);flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:90;background:var(--s1);border-right:1px solid var(--br);display:flex;flex-direction:column;overflow:hidden}
.sn-logo{padding:20px 18px 14px;display:flex;align-items:center;gap:12px;text-decoration:none}
.sn-logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--v),var(--b));display:grid;place-items:center;font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:#fff;flex-shrink:0}
.sn-logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;background:linear-gradient(135deg,#C4B5FD,#7DD3FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.sn-logo-text span{opacity:.5}
.sn-user{margin:0 12px 16px;padding:12px;background:var(--s2);border:1px solid var(--br);border-radius:14px;display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;overflow:hidden;transition:background .2s;cursor:pointer}
.sn-user:hover{background:rgba(124,58,237,.12)}
.sn-ava{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;color:#fff;border:2px solid var(--br);flex-shrink:0}
.sn-uinfo{min-width:0;flex:1}
.sn-uname{font-family:'Syne',sans-serif;font-weight:700;font-size:.84rem;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sn-uhandle{font-size:.72rem;color:var(--mu);white-space:nowrap}
.sn-online{width:8px;height:8px;border-radius:50%;background:var(--gn);flex-shrink:0;box-shadow:0 0 6px var(--gn)}
.sn-sec{padding:0 8px;margin-bottom:6px}
.sn-div{height:1px;background:var(--br);margin:8px 16px}
.sn-it{display:flex;align-items:center;gap:12px;padding:10px;border-radius:12px;color:var(--mu);font-size:.88rem;font-weight:500;transition:all .18s;cursor:pointer;white-space:nowrap;overflow:hidden}
.sn-it:hover{background:rgba(124,58,237,.1);color:var(--tx)}
.sn-it.active{background:rgba(124,58,237,.18);color:var(--vl)}
.sn-it svg{width:20px;height:20px;flex-shrink:0}
.sn-it span{flex:1;overflow:hidden;text-overflow:ellipsis}
/* MAIN */
.main{margin-left:var(--nav-w);flex:1;min-width:0;position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
/* TOPBAR */
.topbar{height:56px;background:rgba(9,9,15,.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.tb-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:#fff;display:flex;align-items:center;gap:8px}
.e2e-pill{font-size:.64rem;padding:2px 8px;border-radius:20px;background:rgba(52,211,153,.1);color:var(--gn);border:1px solid rgba(52,211,153,.22);display:flex;align-items:center;gap:4px}
.e2e-pill svg{width:9px;height:9px}
.ws-pill{margin-left:auto;font-size:.7rem;color:var(--mu);display:flex;align-items:center;gap:5px}
.ws-dot{width:7px;height:7px;border-radius:50%;background:var(--mu2);transition:all .4s}
.ws-dot.on{background:var(--gn);box-shadow:0 0 6px var(--gn)}
/* MESSENGER */
.messenger{display:flex;flex:1;min-height:0}
/* CHATS */
.chats-col{width:300px;flex-shrink:0;border-right:1px solid var(--br);background:var(--s2);display:flex;flex-direction:column;overflow:hidden}
.ch-top{padding:14px 14px 0;flex-shrink:0}
.ch-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ch-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.92rem;color:#fff}
.ch-new{width:28px;height:28px;border-radius:8px;background:none;border:none;color:var(--vl);cursor:pointer;display:grid;place-items:center;transition:background .15s}
.ch-new:hover{background:rgba(124,58,237,.18)}
.ch-search{position:relative;margin-bottom:8px}
.ch-search input{width:100%;padding:7px 10px 7px 30px;background:rgba(255,255,255,.04);border:1px solid var(--br2);border-radius:18px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;transition:all .2s}
.ch-search input:focus{border-color:var(--vl)}
.ch-search input::placeholder{color:var(--mu2)}
.ch-search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--mu);width:13px;height:13px;pointer-events:none}
.ch-scroll{flex:1;overflow-y:auto;padding:4px 8px 8px}
.ch-scroll::-webkit-scrollbar{width:3px}
.ch-scroll::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.ch-item{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:12px;cursor:pointer;transition:background .15s;margin-bottom:2px}
.ch-item:hover{background:rgba(124,58,237,.1)}
.ch-item.on{background:rgba(124,58,237,.18)}
.ch-av{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;color:#fff;position:relative;flex-shrink:0}
.ch-odot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;border:2px solid var(--s2)}
.ch-info{flex:1;min-width:0}
.ch-nm{font-family:'Syne',sans-serif;font-weight:700;font-size:.83rem;color:#fff}
.ch-pr{font-size:.74rem;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.ch-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.ch-tm{font-size:.64rem;color:var(--mu2)}
.ch-bdg{background:var(--v);color:#fff;font-size:.58rem;padding:2px 6px;border-radius:10px;font-weight:700}
/* DIALOG */
.dialog{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--s1)}
.d-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--mu)}
.d-empty svg{width:44px;height:44px;opacity:.2}
.d-empty p{font-size:.88rem}
.d-view{display:none;flex-direction:column;flex:1;min-height:0}
/* dialog header */
.d-hdr{padding:12px 18px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:12px;background:rgba(9,9,15,.7);backdrop-filter:blur(10px);flex-shrink:0}
.d-hdr-av{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;color:#fff;flex-shrink:0}
.d-hdr-info{flex:1;min-width:0}
.d-hdr-nm{font-family:'Syne',sans-serif;font-weight:700;font-size:.93rem;color:#fff}
.d-hdr-sub{font-size:.67rem;color:var(--gn);display:flex;align-items:center;gap:4px;margin-top:2px}
.d-hdr-sub svg{width:9px;height:9px}
.d-hdr-btn{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.04);border:1px solid var(--br2);color:var(--mu);display:grid;place-items:center;cursor:pointer;transition:all .2s}
.d-hdr-btn:hover{background:rgba(124,58,237,.15);color:var(--vl)}
.d-hdr-btn svg{width:14px;height:14px}
/* messages */
.msgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.dt-sep{text-align:center;margin:8px 0;font-size:.66rem;color:var(--mu2)}
.dt-sep span{background:var(--s2);padding:2px 10px;border-radius:18px;border:1px solid var(--br)}
.mrow{display:flex;gap:7px;align-items:flex-end;margin-bottom:1px}
.mrow.me{justify-content:flex-end}
.sm-av{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.56rem;color:#fff;flex-shrink:0}
.mrow.grp .sm-av{visibility:hidden}
.mbbl{max-width:65%;padding:8px 12px;border-radius:16px;border-bottom-left-radius:4px;font-size:.87rem;line-height:1.5;word-break:break-word;background:var(--s3);border:1px solid var(--br2);color:var(--tx)}
.me .mbbl{background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(37,99,235,.28));border-color:rgba(124,58,237,.35);border-bottom-left-radius:16px;border-bottom-right-radius:4px}
.mbbl-img{max-width:220px;border-radius:10px;display:block;cursor:pointer;margin-top:4px}
.mftr{display:flex;align-items:center;gap:4px;margin-top:2px;justify-content:flex-end}
.mtm{font-size:.6rem;color:var(--mu2)}
.mst{width:11px;height:11px;color:var(--mu2)}
.mst.rd{color:var(--vl)}
/* typing */
.typ-row{display:flex;align-items:flex-end;gap:7px;padding:3px 0}
.typ-bbl{padding:8px 12px;background:var(--s3);border:1px solid var(--br2);border-radius:16px;border-bottom-left-radius:4px}
.tdots{display:flex;gap:4px;align-items:center}
.tdots i{width:5px;height:5px;border-radius:50%;background:var(--mu);display:block;animation:td 1.1s infinite}
.tdots i:nth-child(2){animation-delay:.18s}.tdots i:nth-child(3){animation-delay:.36s}
@keyframes td{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
/* input */
.inp-wrap{padding:10px 14px 12px;background:var(--s2);border-top:1px solid var(--br);flex-shrink:0;position:relative}
.inp-imgs{display:flex;gap:7px;padding-bottom:8px;padding-left:42px;flex-wrap:wrap}
.inp-img{position:relative;width:66px;height:66px;border-radius:9px;overflow:hidden}
.inp-img img{width:100%;height:100%;object-fit:cover}
.inp-img-rm{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.8);border:none;cursor:pointer;color:#fff;display:grid;place-items:center;font-size:9px}
.inp-row{display:flex;gap:8px;align-items:flex-end}
.inp-att{width:34px;height:34px;border-radius:50%;background:none;border:1px solid var(--br2);color:var(--mu);display:grid;place-items:center;cursor:pointer;transition:all .18s;flex-shrink:0}
.inp-att:hover{background:rgba(124,58,237,.15);color:var(--vl)}
.inp-att svg{width:15px;height:15px}
.inp-box{flex:1;background:var(--s3);border:1px solid var(--br2);border-radius:20px;padding:5px 10px;display:flex;align-items:flex-end;gap:5px;transition:border-color .2s}
.inp-box:focus-within{border-color:var(--vl)}
.inp-ta{flex:1;background:none;border:none;outline:none;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.89rem;resize:none;max-height:110px;padding:5px 0;line-height:1.4}
.inp-ta::placeholder{color:var(--mu2)}
.inp-emo{background:none;border:none;color:var(--mu);cursor:pointer;width:26px;height:26px;border-radius:50%;display:grid;place-items:center;transition:all .18s;flex-shrink:0}
.inp-emo:hover{background:rgba(124,58,237,.14);color:var(--vl)}
.inp-emo svg{width:15px;height:15px}
.inp-send{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--v),var(--b));border:none;color:#fff;display:grid;place-items:center;cursor:pointer;transition:opacity .2s,transform .15s;flex-shrink:0}
.inp-send:hover{opacity:.9;transform:scale(1.06)}
.inp-send:active{transform:scale(.94)}
.inp-send:disabled{opacity:.3;cursor:not-allowed;transform:none}
.inp-send svg{width:15px;height:15px}
/* emoji */
.emo-rel{position:relative}
.emo-pop{position:absolute;bottom:46px;right:0;background:var(--s3);border:1px solid var(--br);border-radius:14px;padding:8px;width:230px;display:none;grid-template-columns:repeat(6,1fr);gap:3px;z-index:300;box-shadow:0 8px 28px rgba(0,0,0,.6)}
.emo-pop.show{display:grid}
.emo-it{background:none;border:none;font-size:1.35rem;padding:4px;cursor:pointer;border-radius:6px;text-align:center;transition:background .1s}
.emo-it:hover{background:rgba(124,58,237,.2)}
/* lightbox */
.lb{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.94);display:none;align-items:center;justify-content:center}
.lb.on{display:flex}
.lb img{max-width:90vw;max-height:90vh;border-radius:10px}
.lb-x{position:absolute;top:16px;right:16px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.1);border:none;cursor:pointer;color:#fff;display:grid;place-items:center}
.lb-x svg{width:15px;height:15px}
/* toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(10px);padding:9px 20px;border-radius:11px;font-family:'Syne',sans-serif;font-weight:600;font-size:.83rem;color:#fff;opacity:0;transition:all .28s cubic-bezier(.22,1,.36,1);z-index:9999;pointer-events:none;background:linear-gradient(135deg,var(--v),var(--b));box-shadow:0 6px 24px rgba(0,0,0,.5)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
/* responsive */
@media(max-width:1100px){.chats-col{width:260px}}
@media(max-width:860px){:root{--nav-w:68px}}
@media(max-width:700px){.chats-col{position:absolute;width:84%;height:calc(100% - 56px);top:56px;z-index:50;display:none}.chats-col.show{display:flex}}

/* ══ VOICE RECORDING — TELEGRAM STYLE ═══════════════════ */
.voice-rec-btn{width:38px;height:38px;border-radius:50%;background:none;border:1px solid var(--br2);color:var(--mu);display:grid;place-items:center;cursor:pointer;transition:all .18s;flex-shrink:0;user-select:none;-webkit-user-select:none;touch-action:none}
.voice-rec-btn svg{width:16px;height:16px;pointer-events:none}
.voice-rec-btn:hover{background:rgba(124,58,237,.15);color:var(--vl)}
.voice-rec-btn.rec-active{background:var(--er);border-color:var(--er);color:#fff;animation:pulse-rec .9s ease-in-out infinite}
.voice-rec-btn.rec-locked{background:var(--v);border-color:var(--v);color:#fff;animation:none}
@keyframes pulse-rec{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.5)}50%{box-shadow:0 0 0 7px rgba(248,113,113,0)}}

/* Recording overlay bar (shows on top of input when recording) */
.v-rec-overlay{position:absolute;inset:0;background:var(--s2);border-top:1px solid var(--br);display:none;align-items:center;gap:10px;padding:0 14px;z-index:10;border-radius:0;overflow:hidden}
.v-rec-overlay.show{display:flex}
.v-rec-dot{width:9px;height:9px;border-radius:50%;background:var(--er);flex-shrink:0;animation:blink-dot 1s step-start infinite}
@keyframes blink-dot{0%,100%{opacity:1}50%{opacity:.2}}
.v-rec-time{font-family:'Syne',sans-serif;font-weight:700;font-size:.86rem;color:var(--er);flex-shrink:0;min-width:34px}
.v-rec-wave{flex:1;height:32px;display:flex;align-items:center;gap:2px;overflow:hidden}
.v-wbar{width:3px;border-radius:2px;background:rgba(124,58,237,.5);flex-shrink:0;transition:height .07s ease;min-height:3px}
.v-rec-slide-hint{font-size:.76rem;color:var(--mu);display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;transition:opacity .3s}
.v-rec-slide-hint svg{width:12px;height:12px}
.v-lock-btn{width:28px;height:28px;border-radius:50%;background:rgba(124,58,237,.18);border:1px solid rgba(124,58,237,.35);color:var(--vl);display:grid;place-items:center;cursor:pointer;transition:all .18s;flex-shrink:0}
.v-lock-btn svg{width:13px;height:13px;pointer-events:none}
.v-lock-btn:hover{background:var(--v);color:#fff}

/* Locked state — preview bar before sending */
.v-locked-bar{display:none;align-items:center;gap:10px;padding:10px 14px 12px;background:var(--s2);border-top:1px solid var(--br)}
.v-locked-bar.show{display:flex}
.v-locked-wave{flex:1;height:28px;display:flex;align-items:center;gap:1.5px;overflow:hidden;cursor:pointer}
.v-locked-wbar{width:3px;border-radius:2px;background:rgba(124,58,237,.4);flex-shrink:0}
.v-locked-wbar.p{background:var(--vl)}
.v-locked-time{font-family:'Syne',sans-serif;font-weight:600;font-size:.82rem;color:var(--mu);min-width:34px}
.v-locked-cancel{background:none;border:none;color:var(--er);cursor:pointer;width:30px;height:30px;border-radius:50%;display:grid;place-items:center;transition:background .15s}
.v-locked-cancel:hover{background:rgba(248,113,113,.1)}
.v-locked-cancel svg{width:14px;height:14px;pointer-events:none}
.v-locked-send{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--v),var(--b));border:none;color:#fff;display:grid;place-items:center;cursor:pointer;transition:all .18s;flex-shrink:0}
.v-locked-send:hover{opacity:.9;transform:scale(1.06)}
.v-locked-send svg{width:14px;height:14px;pointer-events:none}

/* Voice message BUBBLE */
.vmsg{display:flex;align-items:center;gap:8px;width:100%;max-width:240px;padding:2px 0}
.vm-play{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:#fff;display:grid;place-items:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.me .vm-play{background:rgba(255,255,255,.2)}
.vm-play:hover{background:rgba(255,255,255,.25);transform:scale(1.06)}
.vm-play svg{width:13px;height:13px}
.vm-body{flex:1;min-width:0;overflow:hidden}
.vm-wform{height:28px;display:flex;align-items:flex-end;gap:1.5px;cursor:pointer;overflow:hidden;margin-bottom:2px;position:relative}
.vm-wbar{width:3px;min-height:3px;max-height:26px;border-radius:2px;background:rgba(255,255,255,.3);transition:background .1s,height .06s;flex-shrink:0}
.me .vm-wbar{background:rgba(255,255,255,.35)}
.vm-wbar.played{background:rgba(255,255,255,.8)}
.me .vm-wbar.played{background:#fff}
.vm-footer{display:flex;align-items:center;justify-content:space-between}
.vm-dur{font-size:.68rem;color:rgba(255,255,255,.55);font-family:'Syne',sans-serif;font-weight:600}
.me .vm-dur{color:rgba(255,255,255,.7)}

/* ── THEME VARIANTS ──────────────────────────────────── */
body.light{--bg:#F0EFF8;--s1:#E8E6F5;--s2:#EAE8F8;--s3:#DDD9F5;--br:rgba(124,58,237,.15);--br2:rgba(0,0,0,.07);--tx:#1A1128;--mu:#7070A0;--mu2:#A0A0C0}
body.amoled{--bg:#000;--s1:#000;--s2:#0A0A12;--s3:#0E0E1A}
body.light::before{background-image:radial-gradient(circle,rgba(124,58,237,.07) 1px,transparent 1px)}

/* ── Mobile bottom nav ── */
@media(max-width:600px){
  .mob-nav{display:flex!important}
  :root{--nav-w:0px!important}
  .sidenav,.nav{display:none!important}
  .main{margin-left:0!important;padding-bottom:64px!important}
  
}


.mob-nav-btn.active,.mob-nav-btn:hover{color:var(--vl)}
.mob-nav-btn svg{width:22px;height:22px}

.mob-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  height:60px;
  background:var(--s1);
  border-top:1px solid var(--br);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  align-items:center;justify-content:space-around;
  padding:0 4px;

<script>
// ══════════════════════════════════════════════════════
//  E2E: ECDH P-256 + AES-GCM 256
//  Правильный алгоритм:
//    1. Каждый клиент генерирует пару ключей ECDH
//    2. Публичные ключи обмениваются через сервер
//    3. AES ключ = deriveKey(мой_приватный, чужой_публичный)
//    4. У обоих получается одинаковый AES ключ
// ══════════════════════════════════════════════════════
const E2E = {
  kp: null,      // KeyPair {privateKey, publicKey}
  myPub: '',     // собственный публичный ключ base64
  // peerPub[userId] = base64 публичный ключ собеседника
  peerPubs: {},
  // aesCache[peerPub_base64] = CryptoKey AES-GCM
  aesCache: {},

  async init() {
    this.kp = await crypto.subtle.generateKey(
      { name: 'ECDH', namedCurve: 'P-256' }, true, ['deriveKey']
    );
    const raw = await crypto.subtle.exportKey('raw', this.kp.publicKey);
    this.myPub = b64enc(raw);
  },

  async importPub(b64) {
    return crypto.subtle.importKey(
      'raw', b64dec(b64),
      { name: 'ECDH', namedCurve: 'P-256' }, true, []
    );
  },

  // Правильный derive: мой приватный + чужой публичный
  async getAES(peerPubB64) {
    if (this.aesCache[peerPubB64]) return this.aesCache[peerPubB64];
    const peerKey = await this.importPub(peerPubB64);
    const aes = await crypto.subtle.deriveKey(
      { name: 'ECDH', public: peerKey },
      this.kp.privateKey,
      { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
    );
    this.aesCache[peerPubB64] = aes;
    return aes;
  },

  async encrypt(peerPubB64, text) {
    const aes = await this.getAES(peerPubB64);
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const enc = await crypto.subtle.encrypt(
      { name: 'AES-GCM', iv }, aes, new TextEncoder().encode(text)
    );
    return { enc: b64enc(enc), iv: b64enc(iv) };
  },

  async decrypt(senderPubB64, encB64, ivB64) {
    // Decrypt using sender's pub key + our private key (same shared secret)
    const aes = await this.getAES(senderPubB64);
    const plain = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: b64dec(ivB64) }, aes, b64dec(encB64)
    );
    return new TextDecoder().decode(plain);
  }
};

function b64enc(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf instanceof ArrayBuffer ? buf : buf.buffer || buf)));
}
function b64dec(b64) {
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}

// ══════════════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════════════
const API = {
  base: '',  // same origin
  tok() { return localStorage.getItem('weave_token') || sessionStorage.getItem('weave_token') || ''; },
  async r(url, o = {}) {
    const res = await fetch('/api' + url, {
      ...o,
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + this.tok(), ...o.headers }
    });
    if (res.status === 401) { logout(); throw 0; }
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || 'Ошибка ' + res.status); }
    return res.json();
  },
  chats: ()      => API.r('/chats'),
  history: uid   => API.r('/messages/' + uid),
  sendREST: (tid, txt, extra) => API.r('/messages', { method: 'POST', body: JSON.stringify({ toId: tid, text: txt, ...extra }) }),
  user: id       => API.r('/users/' + id)
};

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let ME = null, WS = null;
let allChats = [], filteredChats = [];
let active = null;   // active chat object
let msgs = [];
let pendImgs = [];
let typTimer = null;
let wsReady = false;
let _wsRetry = 0;

// ══════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  // Load user — сначала из localStorage, потом всегда обновляем с сервера
  if (!API.tok()) { location.href = 'login.html'; return; }
  const saved = localStorage.getItem('weave_current_user');
  ME = saved ? JSON.parse(saved) : null;
  try {
    ME = await API.r('/users/me');
    localStorage.setItem('weave_current_user', JSON.stringify(ME));
  } catch(e) {
    if (!ME) { location.href = 'login.html'; return; }
  }

  // Fill sidebar
  const ini = ((ME.firstName?.[0]||'') + (ME.lastName?.[0]||'')).toUpperCase() || '?';
  const av = $('sn-ava'); av.textContent = ini; av.style.background = avbg(ME.avatarColor);
  $('sn-name').textContent = (ME.firstName + ' ' + (ME.lastName||'')).trim();
  $('sn-handle').textContent = '@' + ME.username;
  const adminNav = document.getElementById('nav-admin');
  if (adminNav && (ME.isAdmin || ME.isModerator)) adminNav.style.display = 'flex';

  // Init E2E
  await E2E.init();

  // Load chats from REST
  await loadChats();

  // Connect WS
  connectWS();

  // Build emoji picker
  buildEmo();

  // Close emoji on outside click
  document.addEventListener('click', e => { if (!e.target.closest('.emo-rel')) closeEmo(); });

  // URL param: ?user=
  const uid = new URLSearchParams(location.search).get('user');
  if (uid) openChat(uid);
});

// ══════════════════════════════════════════════════════
//  WEBSOCKET
// ══════════════════════════════════════════════════════
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  WS = new WebSocket(proto + '://' + location.host);

  WS.onopen = () => {
    wsReady=true; wsUI(true); _wsRetry=0;
    // Auth
    WS.send(JSON.stringify({ type: 'auth', token: API.tok() }));
    // Send our public key so peers can encrypt messages to us
    WS.send(JSON.stringify({ type: 'pubkey', publicKey: E2E.myPub }));
  };

  WS.onmessage = async ({ data }) => {
    let m; try { m = JSON.parse(data); } catch { return; }

    // Server confirmed auth + sends us known peer keys
    if (m.type === 'auth_ok') return;

    // Peer's public key arrived
    if (m.type === 'peer_pubkey') {
      if (m.fromId && m.publicKey) {
        E2E.peerPubs[m.fromId] = m.publicKey;
        // Update encryption label if this is the active chat
        if (active?.id === m.fromId) updateEncLabel();
      }
      return;
    }

    // Incoming message
    if (m.type === 'message') {
      const msg = m.message;
      await decryptMsg(msg);
      // Convert voiceData → blob URL
      if (msg.voiceData && !msg.voice) {
        try {
          if (msg.voiceData.startsWith('data:')) {
            // data: URL — конвертируем в blob через atob
            const arr = msg.voiceData.split(',');
            const mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]);
            const u8 = new Uint8Array(bstr.length);
            for (let i=0;i<bstr.length;i++) u8[i]=bstr.charCodeAt(i);
            msg.voice = { url: URL.createObjectURL(new Blob([u8],{type:mime})), dur: msg.voiceDur || 0 };
          } else {
            const res = await fetch(msg.voiceData);
            msg.voice = { url: URL.createObjectURL(await res.blob()), dur: msg.voiceDur || 0 };
          }
        } catch(e) { msg.voice = { url: msg.voiceData, dur: msg.voiceDur || 0 }; }
      }
      if (active && (msg.fromId === active.id || msg.toId === active.id)) {
        msgs.push(msg);
        renderMsgs();
        // Send read receipt
        WS.send(JSON.stringify({ type: 'read', fromId: msg.fromId }));
      }
      bumpPreview(msg.fromId === ME.id ? msg.toId : msg.fromId, msg.voice ? '🎙 Голосовое' : (msg._display || ''));
    }

    // Our message was saved by server (update pending)
    if (m.type === 'message_sent') {
      const idx = msgs.findLastIndex(x => x._pnd);
      if (idx !== -1) {
        msgs[idx] = { ...msgs[idx], ...m.message, _pnd: false };
        renderMsgs();
      }
    }

    // Typing from peer
    if (m.type === 'typing' && active?.id === m.fromId) {
      $('typ-ind').style.display = m.isTyping ? 'block' : 'none';
    }

    // Read receipt: our messages were read
    if (m.type === 'read_receipt') {
      msgs.forEach(x => { if (x.fromId === ME.id) x.read = true; });
      // Обновляем галочки точечно без полного ре-рендера
      document.querySelectorAll('.mst').forEach(el => {
        el.classList.add('rd');
        // Добавляем вторую галочку если её нет
        if (!el.querySelector('polyline:nth-child(2)')) {
          const pl = document.createElementNS('http://www.w3.org/2000/svg','polyline');
          pl.setAttribute('points','23 6 14 17');
          el.appendChild(pl);
        }
      });
    }
  };

  WS.onclose = () => {
    wsReady=false; wsUI(false);
    if(!_wsRetry) _wsRetry=0;
    const delay=Math.min(1000*Math.pow(2,_wsRetry),30000);
    _wsRetry++; setTimeout(connectWS,delay);
  };
  WS.onerror = () => { wsReady=false; wsUI(false); WS.close(); };
}

async function decryptMsg(msg) {
  if (msg.encryptedText && msg.senderPublicKey) {
    try {
      msg._display = await E2E.decrypt(msg.senderPublicKey, msg.encryptedText, msg.iv);
    } catch {
      msg._display = msg.text || '[не удалось расшифровать]';
    }
  } else {
    msg._display = msg.text || '';
  }
}

}

async function openChat(uid) {
  // Find or create chat entry
  let chat = allChats.find(c => c.id === uid);
  if (!chat) {
    try {
      const u = await API.user(uid);
      chat = { id: u.id, firstName: u.firstName, lastName: u.lastName, username: u.username, avatarColor: u.avatarColor, unreadCount: 0 };
      allChats.unshift(chat);
      filteredChats = [...allChats];
    } catch { toast('Пользователь не найден'); return; }
  }
  active = chat;
  chat.unreadCount = 0;
  renderChats();

  // Show dialog
  $('d-empty').style.display = 'none';
  const dv = $('d-view'); dv.style.display = 'flex';

async function loadHistory(uid) {
  try {
    const raw = await API.history(uid);
    msgs = [];
    for (const m of raw) {
      await decryptMsg(m);
      // Convert voiceData (base64 data: URL) → blob URL for playback
      if (m.voiceData && !m.voice) {
        try {
          if (m.voiceData.startsWith('data:')) {
            const arr = m.voiceData.split(',');
            const mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]);
            const u8 = new Uint8Array(bstr.length);
            for (let i=0;i<bstr.length;i++) u8[i]=bstr.charCodeAt(i);
            m.voice = { url: URL.createObjectURL(new Blob([u8],{type:mime})), dur: m.voiceDur || 0 };
          } else {
            const res = await fetch(m.voiceData);
            m.voice = { url: URL.createObjectURL(await res.blob()), dur: m.voiceDur || 0 };
          }
        } catch(e) {
          m.voice = { url: m.voiceData, dur: m.voiceDur || 0 };
        }
      }
      msgs.push(m);
    }
    renderMsgs();
  } catch (e) { toast('Ошибка загрузки: ' + e.message); }
}

function renderMsgs() {
  const el = $('msgs');
  if (!msgs.length) {
    el.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--mu);font-size:.84rem">Начните переписку</div>';
    return;
  }

  let html = '', lastDate = '', prevFrom = null;
  for (const m of msgs) {
    const mine = m.fromId === ME.id;
    const d = new Date(m.createdAt).toLocaleDateString('ru', { day:'numeric', month:'long' });
    if (d !== lastDate) {
      html += `<div class="dt-sep"><span>${d}</span></div>`;
      lastDate = d; prevFrom = null;
    }
    const grp = m.fromId === prevFrom;
    const t = new Date(m.createdAt).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    const ini = active ? ((active.firstName?.[0]||'')+(active.lastName?.[0]||'')).toUpperCase() : '?';

    const chk = mine
      ? `<svg class="mst${m.read?' rd':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 6 9 17 4 12"/>${m.read?'<polyline points="23 6 14 17"/>':''}</svg>`
      : '';

    const txt = m._display || m.text || '';
    let body = '';
    if (txt === '[зашифровано]' || txt === '[не удалось расшифровать]') {
      body += `<span style="color:var(--mu);font-style:italic">${txt}</span>`;
    } else if (txt) {
      body += `<span>${esc(txt).replace(/\n/g,'<br>')}</span>`;
    }
    if (m._pnd) body += '<br><span style="font-size:.6rem;color:var(--mu2)">отправка…</span>';
    if (m.images?.length) {
      m.images.forEach(src => { body += `<img class="mbbl-img" src="${src}" onclick="openLb('${src}')" loading="lazy">`; });
    }
    if (m.voice) {
      const dur = m.voice.dur || 0;
      const nb = 28;
      let seed = m.id ? m.id.split('').reduce((a,c)=>a+c.charCodeAt(0),0) : 42;
      const rng=()=>{seed=(seed*1664525+1013904223)&0xffffffff;return((seed>>>0)/0xffffffff);};
      const hs = Array.from({length:nb}, () => Math.floor(4+rng()*22));
      body += `<div class="vmsg">
        <button class="vm-play" id="vp-${m.id}" onclick="playVoice('${m.id}','${m.voice.url||''}',${dur})">${pIco()}</button>
        <div class="vm-body">
          <div class="vm-wform" id="vw-${m.id}" onclick="playVoice('${m.id}','${m.voice.url||''}',${dur})">
            ${hs.map(h=>`<div class="vm-wbar" style="height:${h}px"></div>`).join('')}
          </div>
          <div class="vm-footer">
            <span class="vm-dur" id="vt-${m.id}">${fmtDur(dur)}</span>
          </div>
        </div>
      </div>`;
    }

    html += `<div class="mrow${mine?' me':''}${grp?' grp':''}">
      ${!mine ? `<div class="sm-av" style="background:${avbg(active?.avatarColor)}">${ini}</div>` : ''}
      <div>
        <div class="mbbl">${body}
          <div class="mftr"><span class="mtm">${t}</span>${chk}</div>
        </div>
      </div>
    </div>`;
    prevFrom = m.fromId;
  }
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

// ══════════════════════════════════════════════════════
//  SEND
// ══════════════════════════════════════════════════════
async function send() {
  const ta = $('ta');
  const text = ta.value.trim();
  if (!text && !pendImgs.length || !active) return;
  ta.value = ''; ta.style.height = 'auto';
  $('send-btn').disabled = true;

  const imgs = [...pendImgs];
  pendImgs = []; renderPendImgs();

  // Optimistic
  const opt = {
    id: 'pnd_' + Date.now(), fromId: ME.id, toId: active.id,
    text, _display: text, images: imgs,
    createdAt: new Date().toISOString(), read: false, _pnd: true
  };
  msgs.push(opt);
  renderMsgs();

  try {
    // Если WS ещё не готов — ждём до 5 сек (актуально после cold start на Render)
    if (!wsReady) {
      await new Promise((res, rej) => {
        const t = setTimeout(() => res(), 5000); // таймаут — продолжим без WS
        const check = setInterval(() => { if (wsReady) { clearInterval(check); clearTimeout(t); res(); } }, 200);
      });
    }
    const peerPub = E2E.peerPubs[active.id];

    if (text && wsReady && peerPub) {
      // Full E2E: encrypt with peer's real public key
      const { enc, iv } = await E2E.encrypt(peerPub, text);
      WS.send(JSON.stringify({
        type: 'message',
        toId: active.id,
        encryptedText: enc,
        iv,
        senderPublicKey: E2E.myPub,
        images: imgs
      }));
    } else if (wsReady) {
      // Peer key not yet available — send plain via WS (will be encrypted once key arrives)
      WS.send(JSON.stringify({
        type: 'message',
        toId: active.id,
        plainText: text,
        images: imgs
      }));
    }

    // Always persist via REST (stores in DB, so history loads on refresh)
    let restExtra = {};
    if (peerPub && text) {
      const enc = await E2E.encrypt(peerPub, text); // шифруем один раз
      restExtra = { encryptedText: enc.enc, iv: enc.iv, senderPublicKey: E2E.myPub };
    }
    const saved = await API.sendREST(active.id, text || '[изображение]', {
      images: imgs,
      ...restExtra
    });

    const i = msgs.findLastIndex(x => x._pnd);
    if (i !== -1) msgs[i] = { ...saved, _display: text, images: imgs, _pnd: false };
    renderMsgs();
    bumpPreview(active.id, text || '📷 Фото');

    if (wsReady) WS.send(JSON.stringify({ type: 'typing', toId: active.id, isTyping: false }));
  } catch (e) {
    toast('Ошибка: ' + (e?.message || e));
    msgs = msgs.filter(x => !x._pnd);
    renderMsgs();
  }
}

const avbg = (i=0) => ['linear-gradient(135deg,#7C3AED,#2563EB)','linear-gradient(135deg,#DB2777,#7C3AED)','linear-gradient(135deg,#059669,#2563EB)','linear-gradient(135deg,#D97706,#DB2777)','linear-gradient(135deg,#06B6D4,#7C3AED)','linear-gradient(135deg,#7C3AED,#06B6D4)'][+i%6];
function fmtT(iso) {
  if (!iso) return '';

  if (diff < 86400000) return d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  return d.toLocaleDateString('ru', { day:'numeric', month:'short' });
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ══ VOICE MESSAGES — TELEGRAM STYLE ══════════════════════
let vmr=null, vaChunks=[], vTimer=null, vSecs=0, vAnimReq=null;
let vLocked=false, vStream=null, vFinalBlob=null, vFinalSecs=0;
let vHoldActive=false;
let curAudio=null, curAudioId=null;

// ── Waveform helpers ──────────────────────────────────────
function mkWaveBars(container, count=36, maxH=22){
  container.innerHTML='';

function animWave(container){

}
function genStaticWave(container, count=40){

// ── Hold to record ────────────────────────────────────────
function vStartHold(e){
  e.preventDefault();
  if(vLocked||vmr)return;
  vHoldActive=true;
  startVoiceRec();
}
function vEndHold(e){
  if(!vHoldActive||vLocked)return;
  vHoldActive=false;
  // Short tap (<0.5s) → cancel
  if(vSecs<1){cancelVoice();return;}
  stopAndSend();
}
function vCancelIfNotLocked(e){
  if(vLocked)return;
  if(vHoldActive){ vHoldActive=false; cancelVoice(); }
}

async function startVoiceRec(){
  try{
    vStream=await navigator.mediaDevices.getUserMedia({audio:true});
    vaChunks=[];
    const mimeType=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4']
      .find(m=>MediaRecorder.isTypeSupported(m))||'';
    vmr=new MediaRecorder(vStream,mimeType?{mimeType}:{});
    vmr.ondataavailable=e=>{if(e.data.size>0)vaChunks.push(e.data)};
    vmr.start(100);
    vSecs=0;
    $('voice-btn').classList.add('rec-active');
    $('ta').style.display='none';
    $('send-btn').style.display='none';
    // Show overlay
    $('v-rec-overlay').classList.add('show');
    $('v-rec-time').textContent='0:00';
    mkWaveBars($('v-rec-wave'));
    vTimer=setInterval(()=>{
      vSecs++;
      const m=Math.floor(vSecs/60),s=vSecs%60;
      $('v-rec-time').textContent=m+':'+(s<10?'0':'')+s;
      if(vLocked){ $('v-locked-time').textContent=m+':'+(s<10?'0':'')+s; }
      if(vSecs>=180)lockVoice();
    },1000);
    vAnimReq=setInterval(()=>animWave($('v-rec-wave')),90);
  }catch(err){
    toast('⚠️ Нет доступа к микрофону');
    resetVUI();
  }
}

function lockVoice(){
  if(!vmr||vLocked)return;
  vLocked=true;
  $('voice-btn').classList.remove('rec-active');
  $('voice-btn').classList.add('rec-locked');
  $('v-rec-overlay').classList.remove('show');
  // Show locked bar
  const lb=$('v-locked-bar');
  lb.classList.add('show');
  const m=Math.floor(vSecs/60),s=vSecs%60;
  $('v-locked-time').textContent=m+':'+(s<10?'0':'')+s;
  genStaticWave($('v-locked-wave'));
  // Update locked time while still recording
}

function stopAndSend(){
  if(!vmr)return;
  clearInterval(vTimer); clearInterval(vAnimReq);
  const dur=vSecs;
  vmr.onstop=()=>{
    vStream?.getTracks().forEach(t=>t.stop());
    const blob=new Blob(vaChunks,{type:vmr.mimeType||'audio/webm'});
    sendVoiceMsg(blob,dur);
    resetVUI();
  };
  vmr.stop();
}

function sendLockedVoice(){
  if(!vmr)return;
  clearInterval(vTimer); clearInterval(vAnimReq);
  const dur=vSecs;
  vmr.onstop=()=>{
    vStream?.getTracks().forEach(t=>t.stop());
    const blob=new Blob(vaChunks,{type:vmr.mimeType||'audio/webm'});
    sendVoiceMsg(blob,dur);
    resetVUI();
  };
  vmr.stop();
}

function cancelVoice(){
  clearInterval(vTimer); clearInterval(vAnimReq);
  if(vmr){
    vmr.ondataavailable=null;
    vmr.onstop=()=>{};
    try{vmr.stop();}catch(e){}
    vStream?.getTracks().forEach(t=>t.stop());
  }
  resetVUI();
  toast('🗑 Запись отменена');
}

function resetVUI(){
  $('voice-btn').classList.remove('rec-active','rec-locked');
  $('v-rec-overlay').classList.remove('show');
  $('v-locked-bar').classList.remove('show');
  $('ta').style.display='';
  $('send-btn').style.display='';
  vmr=null; vaChunks=[]; vLocked=false; vStream=null;
  vSecs=0; vHoldActive=false;
}

async function sendVoiceMsg(blob, dur){
  if(!active)return;
  // Convert to base64 for API
  const reader=new FileReader();
  reader.onload=async()=>{
    const b64=reader.result; // data:audio/webm;base64,xxxx
    const objUrl=URL.createObjectURL(blob);
    // Optimistic UI
    const pndId='vpnd_'+Date.now();
    const opt={id:pndId,fromId:ME.id,toId:active.id,text:null,
      voice:{url:objUrl,dur},images:[],createdAt:new Date().toISOString(),read:false,_pnd:true};
    msgs.push(opt); renderMsgs();
    scrollToBottom();
    try{
      const res=await API.r('/messages',{method:'POST',body:JSON.stringify({
        toId:active.id, voiceData:b64, voiceDur:dur, text:null
      })});
      const i=msgs.findIndex(x=>x.id===pndId);
      if(i!==-1) msgs[i]={...res, voice:{url:objUrl,dur}, _pnd:false};
      renderMsgs();
      bumpPreview(active.id,'🎙 Голосовое');
    }catch(e){
      toast('Ошибка: '+(e?.message||String(e)));
      msgs=msgs.filter(x=>x.id!==pndId);
      renderMsgs();
    }
  };
  reader.readAsDataURL(blob);
}

// ── Playback ─────────────────────────────────────────────
function playVoice(id, src, dur){
  const playBtn=$('vp-'+id);
  const wform=document.getElementById('vw-'+id);
  const bars=wform?wform.querySelectorAll('.vm-wbar'):[];
  const durEl=$('vt-'+id);

  if(curAudio&&!curAudio.paused){
    curAudio.pause();
    if(curAudioId===id){
      curAudio=null; curAudioId=null;
      if(playBtn)playBtn.innerHTML=pIco();
      return;
    }
    // pause old, play new
    const oldBtn=$('vp-'+curAudioId);
    if(oldBtn)oldBtn.innerHTML=pIco();
    document.querySelectorAll(`#vw-${curAudioId} .vm-wbar`).forEach(b=>b.classList.remove('played'));
  }

  if(!src){toast('Аудио недоступно');return;}
  const a=new Audio(src);
  curAudio=a; curAudioId=id;
  if(playBtn)playBtn.innerHTML=pauseIco();

  a.ontimeupdate=()=>{
    const p=a.currentTime/(a.duration||dur||1);
    const n=Math.floor(p*bars.length);
    bars.forEach((b,i)=>b.classList.toggle('played',i<n));
    if(durEl)durEl.textContent=fmtDur(Math.max(0,(a.duration||dur)-a.currentTime));
  };
  a.onended=()=>{
    if(playBtn)playBtn.innerHTML=pIco();
    bars.forEach(b=>b.classList.remove('played'));
    if(durEl)durEl.textContent=fmtDur(dur);
    curAudio=null; curAudioId=null;
  };
  a.onerror=()=>toast('Ошибка воспроизведения');
  a.play().catch(()=>toast('Ошибка воспроизведения'));
}

function pIco(){return '<svg viewBox="0 0 24 24" width="14" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>';}
function pauseIco(){return '<svg viewBox="0 0 24 24" width="14" fill="white"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';}
function fmtDur(s){s=Math.round(s||0);return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}

      </div>
    </div>`;
  modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
  document.body.appendChild(modal);
}
let newChatTimer = null;
async function searchNewChat(q) {
  clearTimeout(newChatTimer);
  newChatTimer = setTimeout(async () => {
    const el = document.getElementById('new-chat-results');
    if (!q.trim()) { el.innerHTML='<div style="color:var(--mu);font-size:.8rem;text-align:center;padding:20px">Введите имя или никнейм</div>'; return; }
    try {
      const data = await fetch('/api/users?q='+encodeURIComponent(q)+'&limit=10', {headers:{Authorization:'Bearer '+tok()}}).then(r=>r.json());
      const users = Array.isArray(data) ? data : [];
      if (!users.length) { el.innerHTML='<div style="color:var(--mu);font-size:.8rem;text-align:center;padding:20px">Не найдено</div>'; return; }
      const AVA=['linear-gradient(135deg,#7C3AED,#2563EB)','linear-gradient(135deg,#DB2777,#7C3AED)','linear-gradient(135deg,#059669,#2563EB)','linear-gradient(135deg,#D97706,#DB2777)','linear-gradient(135deg,#06B6D4,#7C3AED)','linear-gradient(135deg,#7C3AED,#06B6D4)'];
      el.innerHTML = users.map(u => {
        const ini = ((u.firstName?.[0]||'')+(u.lastName?.[0]||'')).toUpperCase()||'?';
        return `<div onclick="startChatWith('${u.id}','${u.firstName} ${u.lastName||''}'.trim())" style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:background .14s" onmouseover="this.style.background='rgba(255,255,255,.05)'" onmouseout="this.style.background=''">
          <div style="width:36px;height:36px;border-radius:50%;background:${AVA[(u.avatarColor||0)%6]};display:grid;place-items:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.78rem;color:#fff;flex-shrink:0">${ini}</div>
          <div><div style="font-weight:600;font-size:.84rem">${u.firstName} ${u.lastName||''}</div><div style="font-size:.72rem;color:var(--mu)">@${u.username}</div></div>
        </div>`;
      }).join('');
    } catch(e) { el.innerHTML='<div style="color:var(--er);font-size:.8rem;text-align:center;padding:20px">Ошибка</div>'; }
  }, 300);
}
function startChatWith(userId, name) {
  document.getElementById('new-chat-modal')?.remove();
  openChat(userId);
}
